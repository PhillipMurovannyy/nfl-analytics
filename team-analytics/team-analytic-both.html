<script>
(function(){

// Same multi-proxy approach as player tool — works on mobile
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

const CSV_URLS = {
  OFF: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1240443404&single=true&output=csv",
  DEF: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1369376911&single=true&output=csv"
};

const views = {
  Base:     ["Team","plays","total_yards","yards_per_play","epa_per_play","success_rate","third_down_conversion_rate"],
  Advanced: ["Team","explosive_play_rate","early_down_success_rate","score_play_rate","negative_play_rate","red_zone_play_rate","red_zone_success_rate"],
  Passing:  ["Team","plays","pass_rate","pass_success","pass_epa","air_yards_per_attempt","sack_rate","yac_per_completion","explosive_pass_rate","interception_rate"],
  Rushing:  ["Team","plays","rush_play_pct","rush_epa","rush_success","explosive_rush_rate"]
};

const displayNames = {
  Team:"Team", plays:"Plays", total_yards:"Total Yds", yards_per_play:"Yds/Play",
  epa_per_play:"EPA/Play", success_rate:"Success%", third_down_conversion_rate:"3rd Dn%",
  explosive_play_rate:"Explosive%", early_down_success_rate:"Early Dn Succ%",
  score_play_rate:"Score Play%", negative_play_rate:"Neg Play%",
  red_zone_play_rate:"RZ Play%", red_zone_success_rate:"RZ Succ%",
  pass_rate:"Pass%", pass_success:"Pass Succ%", pass_epa:"Pass EPA",
  air_yards_per_attempt:"ADOT", sack_rate:"Sack%", yac_per_completion:"YAC/Comp",
  explosive_pass_rate:"Explosive Pass%", interception_rate:"INT%",
  rush_play_pct:"Rush%", rush_epa:"Rush EPA", rush_success:"Rush Succ%",
  explosive_rush_rate:"Explosive Rush%"
};

const teamLogos = {
  ARI:"https://a.espncdn.com/i/teamlogos/nfl/500/ari.png",ATL:"https://a.espncdn.com/i/teamlogos/nfl/500/atl.png",
  BAL:"https://a.espncdn.com/i/teamlogos/nfl/500/bal.png",BUF:"https://a.espncdn.com/i/teamlogos/nfl/500/buf.png",
  CAR:"https://a.espncdn.com/i/teamlogos/nfl/500/car.png",CHI:"https://a.espncdn.com/i/teamlogos/nfl/500/chi.png",
  CIN:"https://a.espncdn.com/i/teamlogos/nfl/500/cin.png",CLE:"https://a.espncdn.com/i/teamlogos/nfl/500/cle.png",
  DAL:"https://a.espncdn.com/i/teamlogos/nfl/500/dal.png",DEN:"https://a.espncdn.com/i/teamlogos/nfl/500/den.png",
  DET:"https://a.espncdn.com/i/teamlogos/nfl/500/det.png",GB:"https://a.espncdn.com/i/teamlogos/nfl/500/gb.png",
  HOU:"https://a.espncdn.com/i/teamlogos/nfl/500/hou.png",IND:"https://a.espncdn.com/i/teamlogos/nfl/500/ind.png",
  JAX:"https://a.espncdn.com/i/teamlogos/nfl/500/jax.png",KC:"https://a.espncdn.com/i/teamlogos/nfl/500/kc.png",
  LV:"https://a.espncdn.com/i/teamlogos/nfl/500/lv.png",LAC:"https://a.espncdn.com/i/teamlogos/nfl/500/lac.png",
  LAR:"https://a.espncdn.com/i/teamlogos/nfl/500/lar.png",LA:"https://a.espncdn.com/i/teamlogos/nfl/500/lar.png",
  MIA:"https://a.espncdn.com/i/teamlogos/nfl/500/mia.png",MIN:"https://a.espncdn.com/i/teamlogos/nfl/500/min.png",
  NE:"https://a.espncdn.com/i/teamlogos/nfl/500/ne.png",NO:"https://a.espncdn.com/i/teamlogos/nfl/500/no.png",
  NYG:"https://a.espncdn.com/i/teamlogos/nfl/500/nyg.png",NYJ:"https://a.espncdn.com/i/teamlogos/nfl/500/nyj.png",
  PHI:"https://a.espncdn.com/i/teamlogos/nfl/500/phi.png",PIT:"https://a.espncdn.com/i/teamlogos/nfl/500/pit.png",
  SEA:"https://a.espncdn.com/i/teamlogos/nfl/500/sea.png",SF:"https://a.espncdn.com/i/teamlogos/nfl/500/sf.png",
  TB:"https://a.espncdn.com/i/teamlogos/nfl/500/tb.png",TEN:"https://a.espncdn.com/i/teamlogos/nfl/500/ten.png",
  WAS:"https://a.espncdn.com/i/teamlogos/nfl/500/wsh.png",WSH:"https://a.espncdn.com/i/teamlogos/nfl/500/wsh.png"
};

const offReverseMetrics = ["negative_play_rate","interception_rate","sack_rate"];
const defBetterHigh    = ["sack_rate","interception_rate","negative_play_rate"];
const noColor          = new Set(["plays","total_yards"]);

let currentSide = "OFF";
let currentView = "Base";
let dataStore   = { OFF:[], DEF:[] };
let sortState   = { col:null, asc:false };

const thead   = document.getElementById("ntdHead");
const tbody   = document.getElementById("ntdBody");
const loading = document.getElementById("ntdLoading");
const tableWrap = document.querySelector("#nfl-team-dash .ntd-table-wrap");

// ── Fetch with proxy fallback (no PapaParse download mode — fixes mobile CORS) ──
async function fetchCSV(url) {
  let lastErr;
  for (const makeProxy of PROXIES) {
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 7000);
      const res = await fetch(makeProxy(url), { signal: controller.signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const text = await res.text();
      if (!text || text.trim().length < 30) throw new Error("Empty");
      return parseCSV(text);
    } catch(e) { lastErr = e; }
  }
  throw lastErr;
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = splitLine(line);
    const obj = {};
    headers.forEach((h,i) => { obj[h] = (vals[i]||'').trim().replace(/^"|"$/g,''); });
    return obj;
  }).filter(r => r.Team && r.Team.trim());
}

function splitLine(line) {
  const result=[]; let inQ=false, cur='';
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur);cur='';}
    else cur+=c;
  }
  result.push(cur);
  return result;
}

// Load both sheets in parallel
let loadAttempt = 0;
async function loadAll() {
  try {
    const [offData, defData] = await Promise.all([
      fetchCSV(CSV_URLS.OFF),
      fetchCSV(CSV_URLS.DEF)
    ]);
    dataStore.OFF = offData;
    dataStore.DEF = defData;
    loading.style.display = "none";
    tableWrap.style.display = "block";
    renderTable();
  } catch(e) {
    loadAttempt++;
    if (loadAttempt < 2) {
      loading.innerHTML = '<span class="ntd-spinner"></span>RETRYING...';
      setTimeout(loadAll, 1500);
    } else {
      loading.innerHTML = '<p style="color:#ef4444;font-size:14px;letter-spacing:1px">Failed to load. <button onclick="location.reload()" style="background:#3b82f6;border:none;color:#fff;padding:8px 18px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-top:10px;display:block;margin:10px auto 0">Reload</button></p>';
    }
  }
}
loadAll();

// ── Color scale ──
function cellColors(val, min, max, side, col) {
  if (noColor.has(col) || isNaN(val)) return null;
  let pct = (val - min) / (max - min || 1);
  const higherIsGood = side === "OFF" ? !offReverseMetrics.includes(col) : defBetterHigh.includes(col);
  if (!higherIsGood) pct = 1 - pct;
  if (pct >= 0.80) return { bg:"rgba(34,197,94,0.25)",  text:"#4ade80" };
  if (pct >= 0.60) return { bg:"rgba(34,197,94,0.12)",  text:"#86efac" };
  if (pct >= 0.40) return { bg:"rgba(251,191,36,0.15)", text:"#fbbf24" };
  if (pct >= 0.20) return { bg:"rgba(249,115,22,0.20)", text:"#fb923c" };
  return                  { bg:"rgba(239,68,68,0.22)",  text:"#f87171" };
}

function fmt(v, col) {
  const n = parseFloat(v);
  if (isNaN(n)) return "—";
  if (col === "plays") return n.toFixed(0);
  if (col === "total_yards") return n.toLocaleString();
  if (col.includes("epa")) return (n >= 0 ? "+" : "") + n.toFixed(3);
  if (Math.abs(n) < 1 && Math.abs(n) > 0.001) return (n*100).toFixed(1) + "%";
  return n.toFixed(2);
}

function renderTable() {
  const cols = views[currentView];
  const data = [...dataStore[currentSide]];

  if (sortState.col && cols.includes(sortState.col)) {
    data.sort((a,b) => {
      const A = parseFloat(a[sortState.col])||0;
      const B = parseFloat(b[sortState.col])||0;
      return sortState.asc ? A-B : B-A;
    });
  }

  const stats = {};
  cols.forEach(k => {
    if (k==="Team") return;
    const vals = data.map(d=>parseFloat(d[k])).filter(x=>!isNaN(x));
    stats[k] = { min:Math.min(...vals), max:Math.max(...vals) };
  });

  thead.innerHTML =
    `<th class="ntd-rank" style="cursor:default"></th>` +
    cols.map(c => {
      const cls = c===sortState.col ? (sortState.asc?"sort-asc":"sort-desc") : "";
      const align = c==="Team" ? "text-align:left;padding-left:10px;" : "";
      return `<th class="${cls}" data-col="${c}" style="${align}">${displayNames[c]||c}</th>`;
    }).join("");

  tbody.innerHTML = data.map((row,idx) => {
    const team = (row.Team||"").trim().toUpperCase();
    const logo = teamLogos[team]||"";
    let html = `<tr><td class="ntd-rank">${idx+1}</td>`;
    html += `<td style="padding:0"><div class="ntd-team"><img src="${logo}" alt="${team}" onerror="this.style.visibility='hidden'"><span>${team}</span></div></td>`;
    cols.slice(1).forEach(col => {
      const val = parseFloat(row[col]);
      const c = cellColors(val, stats[col].min, stats[col].max, currentSide, col);
      const style = c ? `background:${c.bg};color:${c.text};` : `color:#e2e8f0;`;
      html += `<td style="${style}">${fmt(val,col)}</td>`;
    });
    return html + `</tr>`;
  }).join("");

  thead.querySelectorAll("th[data-col]").forEach(th => {
    th.onclick = () => {
      const col = th.dataset.col;
      if (col==="Team") return;
      sortState.asc = sortState.col===col ? !sortState.asc : false;
      sortState.col = col;
      renderTable();
    };
  });
}

// Button handlers
document.querySelectorAll("#nfl-team-dash .ntd-toggle").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#nfl-team-dash .ntd-toggle").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentSide = btn.dataset.side;
    sortState = {col:null,asc:false};
    renderTable();
  });
});

document.querySelectorAll("#nfl-team-dash .ntd-view").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll("#nfl-team-dash .ntd-view").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    currentView = tab.dataset.view;
    sortState = {col:null,asc:false};
    renderTable();
  });
});

})();
</script>
