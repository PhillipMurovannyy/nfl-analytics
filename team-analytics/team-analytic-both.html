<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<div id="nfl-team-dash">

  <div class="ntd-header">
    <div class="ntd-header-left">
      <h2 class="ntd-title">NFL TEAM ANALYTICS</h2>
      <span class="ntd-season">2025–26 Season &nbsp;·&nbsp; Data: xEP Network</span>
    </div>
    <img src="https://xep.ai/wp-content/uploads/2024/07/Logo-PNG-2-1.png" alt="xEP" class="ntd-logo" onerror="this.style.display='none'">
  </div>

  <!-- Controls built by JS so inline styles are guaranteed -->
  <div id="ntdControls"></div>

  <div id="ntdDesc" style="background:#0d1526;border:1px solid #1e3058;border-radius:8px;padding:10px 16px;margin:0 0 14px;font-family:'Roboto Condensed',sans-serif;font-size:13px;color:#64748b;letter-spacing:0.5px;">
    <strong style="color:#94a3b8;font-weight:700;">Success Rate</strong> = % of plays with positive EPA &nbsp;&nbsp;|&nbsp;&nbsp; Click any column header to sort
  </div>

  <div id="ntdLoading" style="text-align:center;padding:50px 20px;color:#64748b;font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase;">
    <div id="ntdSpinner" style="width:24px;height:24px;border:3px solid #1e3058;border-top-color:#3b82f6;border-radius:50%;animation:ntd-spin 0.8s linear infinite;margin:0 auto 10px;"></div>
    LOADING DATA...
  </div>

  <!-- Table container — overflow-x scroll lives here as inline style -->
  <div id="ntdTableWrap" style="display:none;border:1px solid #1e3058;border-radius:10px;overflow:hidden;">
    <div id="ntdTableScroll" style="overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;">
      <table id="ntdTable" style="border-collapse:collapse;text-align:center;font-family:'Roboto Condensed',sans-serif;">
        <thead><tr id="ntdHead"></tr></thead>
        <tbody id="ntdBody"></tbody>
      </table>
    </div>
  </div>

</div>

<style>
@keyframes ntd-spin { to { transform: rotate(360deg); } }

/* Minimal CSS — just scoped resets. All layout done in JS inline styles */
#nfl-team-dash, #nfl-team-dash *, #nfl-team-dash *::before, #nfl-team-dash *::after {
  box-sizing: border-box !important;
  font-family: 'Roboto Condensed', sans-serif !important;
}
#nfl-team-dash {
  background: #060a14 !important;
  color: #e2e8f0 !important;
  padding: 24px 20px 40px !important;
  border-radius: 12px !important;
  max-width: 1200px !important;
  margin: auto !important;
  position: relative !important;
}
#nfl-team-dash .ntd-header {
  display: flex !important;
  align-items: center !important;
  justify-content: space-between !important;
  margin: 0 0 20px !important;
  padding: 0 0 16px !important;
  border-bottom: 1px solid #1e3058 !important;
}
#nfl-team-dash .ntd-header-left { display: flex !important; flex-direction: column !important; gap: 4px !important; }
#nfl-team-dash .ntd-title {
  font-weight: 900 !important; font-size: 26px !important; letter-spacing: 3px !important;
  color: #fff !important; text-transform: uppercase !important; line-height: 1 !important;
  margin: 0 !important; padding: 0 !important; border: none !important;
}
#nfl-team-dash .ntd-season {
  font-size: 12px !important; font-weight: 600 !important; letter-spacing: 1.5px !important;
  text-transform: uppercase !important; color: #3b82f6 !important;
}
#nfl-team-dash .ntd-logo {
  height: 40px !important; width: auto !important; max-width: 130px !important;
  object-fit: contain !important; opacity: 0.9 !important;
}
@media (max-width: 700px) {
  #nfl-team-dash { padding: 14px 10px 30px !important; }
  #nfl-team-dash .ntd-title { font-size: 18px !important; letter-spacing: 2px !important; }
  #nfl-team-dash .ntd-logo { display: none !important; }
}
</style>

<script>
(function(){

const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

const CSV_URLS = {
  OFF: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1240443404&single=true&output=csv",
  DEF: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1369376911&single=true&output=csv"
};

const views = {
  Base:     ["Team","plays","total_yards","yards_per_play","epa_per_play","success_rate","third_down_conversion_rate"],
  Advanced: ["Team","explosive_play_rate","early_down_success_rate","score_play_rate","negative_play_rate","red_zone_play_rate","red_zone_success_rate"],
  Passing:  ["Team","plays","pass_rate","pass_success","pass_epa","air_yards_per_attempt","sack_rate","yac_per_completion","explosive_pass_rate","interception_rate"],
  Rushing:  ["Team","plays","rush_play_pct","rush_epa","rush_success","explosive_rush_rate"]
};

const displayNames = {
  Team:"Team", plays:"Plays", total_yards:"Total Yds", yards_per_play:"Yds/Play",
  epa_per_play:"EPA/Play", success_rate:"Success%", third_down_conversion_rate:"3rd Dn%",
  explosive_play_rate:"Explosive%", early_down_success_rate:"Early Dn%",
  score_play_rate:"Score%", negative_play_rate:"Neg%",
  red_zone_play_rate:"RZ Play%", red_zone_success_rate:"RZ Succ%",
  pass_rate:"Pass%", pass_success:"Pass Succ%", pass_epa:"Pass EPA",
  air_yards_per_attempt:"ADOT", sack_rate:"Sack%", yac_per_completion:"YAC",
  explosive_pass_rate:"Exp Pass%", interception_rate:"INT%",
  rush_play_pct:"Rush%", rush_epa:"Rush EPA", rush_success:"Rush Succ%",
  explosive_rush_rate:"Exp Rush%"
};

const teamLogos = {
  ARI:"https://a.espncdn.com/i/teamlogos/nfl/500/ari.png",ATL:"https://a.espncdn.com/i/teamlogos/nfl/500/atl.png",
  BAL:"https://a.espncdn.com/i/teamlogos/nfl/500/bal.png",BUF:"https://a.espncdn.com/i/teamlogos/nfl/500/buf.png",
  CAR:"https://a.espncdn.com/i/teamlogos/nfl/500/car.png",CHI:"https://a.espncdn.com/i/teamlogos/nfl/500/chi.png",
  CIN:"https://a.espncdn.com/i/teamlogos/nfl/500/cin.png",CLE:"https://a.espncdn.com/i/teamlogos/nfl/500/cle.png",
  DAL:"https://a.espncdn.com/i/teamlogos/nfl/500/dal.png",DEN:"https://a.espncdn.com/i/teamlogos/nfl/500/den.png",
  DET:"https://a.espncdn.com/i/teamlogos/nfl/500/det.png",GB:"https://a.espncdn.com/i/teamlogos/nfl/500/gb.png",
  HOU:"https://a.espncdn.com/i/teamlogos/nfl/500/hou.png",IND:"https://a.espncdn.com/i/teamlogos/nfl/500/ind.png",
  JAX:"https://a.espncdn.com/i/teamlogos/nfl/500/jax.png",KC:"https://a.espncdn.com/i/teamlogos/nfl/500/kc.png",
  LV:"https://a.espncdn.com/i/teamlogos/nfl/500/lv.png",LAC:"https://a.espncdn.com/i/teamlogos/nfl/500/lac.png",
  LAR:"https://a.espncdn.com/i/teamlogos/nfl/500/lar.png",LA:"https://a.espncdn.com/i/teamlogos/nfl/500/lar.png",
  MIA:"https://a.espncdn.com/i/teamlogos/nfl/500/mia.png",MIN:"https://a.espncdn.com/i/teamlogos/nfl/500/min.png",
  NE:"https://a.espncdn.com/i/teamlogos/nfl/500/ne.png",NO:"https://a.espncdn.com/i/teamlogos/nfl/500/no.png",
  NYG:"https://a.espncdn.com/i/teamlogos/nfl/500/nyg.png",NYJ:"https://a.espncdn.com/i/teamlogos/nfl/500/nyj.png",
  PHI:"https://a.espncdn.com/i/teamlogos/nfl/500/phi.png",PIT:"https://a.espncdn.com/i/teamlogos/nfl/500/pit.png",
  SEA:"https://a.espncdn.com/i/teamlogos/nfl/500/sea.png",SF:"https://a.espncdn.com/i/teamlogos/nfl/500/sf.png",
  TB:"https://a.espncdn.com/i/teamlogos/nfl/500/tb.png",TEN:"https://a.espncdn.com/i/teamlogos/nfl/500/ten.png",
  WAS:"https://a.espncdn.com/i/teamlogos/nfl/500/wsh.png",WSH:"https://a.espncdn.com/i/teamlogos/nfl/500/wsh.png"
};

const offReverseMetrics = ["negative_play_rate","interception_rate","sack_rate"];
const defBetterHigh    = ["sack_rate","interception_rate","negative_play_rate"];
const noColor          = new Set(["plays","total_yards"]);

let currentSide = "OFF";
let currentView = "Base";
let dataStore   = { OFF:[], DEF:[] };
let sortState   = { col:null, asc:false };

// ── Build controls entirely in JS with inline styles ──
function buildControls() {
  const wrap = document.getElementById('ntdControls');
  wrap.style.cssText = 'display:flex;align-items:center;gap:16px;margin:0 0 14px;flex-wrap:wrap;';

  const grpStyle = 'display:flex;background:#0d1526;border:1.5px solid #1e3058;border-radius:8px;padding:4px;gap:4px;';
  const btnBase  = 'font-family:\'Roboto Condensed\',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:none;border-radius:6px;cursor:pointer;color:#64748b;background:transparent;line-height:1;white-space:nowrap;transition:background 0.2s,color 0.2s;';

  // Offense / Defense
  const tg = document.createElement('div');
  tg.style.cssText = grpStyle;
  [['OFF','Offense','9px 28px'],['DEF','Defense','9px 28px']].forEach(([side,label,pad]) => {
    const b = document.createElement('button');
    b.style.cssText = btnBase + 'padding:' + pad + ';';
    b.textContent = label;
    b.dataset.side = side;
    if (side === 'OFF') applyToggleActive(b, 'OFF');
    b.addEventListener('click', () => {
      tg.querySelectorAll('button').forEach(x => resetToggle(x));
      applyToggleActive(b, side);
      currentSide = side;
      sortState = {col:null,asc:false};
      renderTable();
    });
    tg.appendChild(b);
  });
  wrap.appendChild(tg);

  // Base / Advanced / Passing / Rushing
  const vg = document.createElement('div');
  vg.style.cssText = grpStyle;
  [['Base','Base'],['Advanced','Advanced'],['Passing','Passing'],['Rushing','Rushing']].forEach(([view,label]) => {
    const b = document.createElement('button');
    b.style.cssText = btnBase + 'padding:9px 22px;';
    b.textContent = label;
    b.dataset.view = view;
    if (view === 'Base') applyViewActive(b);
    b.addEventListener('click', () => {
      vg.querySelectorAll('button').forEach(x => resetView(x));
      applyViewActive(b);
      currentView = view;
      sortState = {col:null,asc:false};
      renderTable();
    });
    vg.appendChild(b);
  });
  wrap.appendChild(vg);
}

function applyToggleActive(btn, side) {
  btn.style.background = side === 'OFF' ? '#14532d' : '#7f1d1d';
  btn.style.color       = side === 'OFF' ? '#4ade80' : '#fca5a5';
}
function resetToggle(btn) {
  btn.style.background = 'transparent';
  btn.style.color = '#64748b';
}
function applyViewActive(btn) {
  btn.style.background = '#3b82f6';
  btn.style.color = '#fff';
}
function resetView(btn) {
  btn.style.background = 'transparent';
  btn.style.color = '#64748b';
}

// ── Fetch ──
async function fetchCSV(url) {
  let lastErr;
  for (const makeProxy of PROXIES) {
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 7000);
      const res = await fetch(makeProxy(url), { signal: controller.signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const text = await res.text();
      if (!text || text.trim().length < 30) throw new Error("Empty");
      return parseCSV(text);
    } catch(e) { lastErr = e; }
  }
  throw lastErr;
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = splitLine(line);
    const obj = {};
    headers.forEach((h,i) => { obj[h] = (vals[i]||'').trim().replace(/^"|"$/g,''); });
    return obj;
  }).filter(r => r.Team && r.Team.trim());
}

function splitLine(line) {
  const result=[]; let inQ=false, cur='';
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur);cur='';}
    else cur+=c;
  }
  result.push(cur);
  return result;
}

let loadAttempt = 0;
async function loadAll() {
  try {
    const [offData, defData] = await Promise.all([fetchCSV(CSV_URLS.OFF), fetchCSV(CSV_URLS.DEF)]);
    dataStore.OFF = offData;
    dataStore.DEF = defData;
    document.getElementById('ntdLoading').style.display = 'none';
    document.getElementById('ntdTableWrap').style.display = 'block';
    renderTable();
  } catch(e) {
    loadAttempt++;
    if (loadAttempt < 2) {
      document.getElementById('ntdLoading').innerHTML = '<div style="width:24px;height:24px;border:3px solid #1e3058;border-top-color:#3b82f6;border-radius:50%;animation:ntd-spin 0.8s linear infinite;margin:0 auto 10px;"></div>RETRYING...';
      setTimeout(loadAll, 1500);
    } else {
      document.getElementById('ntdLoading').innerHTML = '<p style="color:#ef4444;font-family:\'Roboto Condensed\',sans-serif;font-size:14px;letter-spacing:1px;margin-bottom:12px;">Failed to load data.</p><button onclick="location.reload()" style="background:#3b82f6;border:none;color:#fff;padding:9px 20px;border-radius:6px;cursor:pointer;font-family:\'Roboto Condensed\',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;">Reload</button>';
    }
  }
}

// ── Color scale ──
function cellColors(val, min, max, side, col) {
  if (noColor.has(col) || isNaN(val)) return null;
  let pct = (val - min) / (max - min || 1);
  const higherIsGood = side === "OFF" ? !offReverseMetrics.includes(col) : defBetterHigh.includes(col);
  if (!higherIsGood) pct = 1 - pct;
  if (pct >= 0.80) return { bg:"rgba(34,197,94,0.25)",  text:"#4ade80" };
  if (pct >= 0.60) return { bg:"rgba(34,197,94,0.12)",  text:"#86efac" };
  if (pct >= 0.40) return { bg:"rgba(251,191,36,0.15)", text:"#fbbf24" };
  if (pct >= 0.20) return { bg:"rgba(249,115,22,0.20)", text:"#fb923c" };
  return                  { bg:"rgba(239,68,68,0.22)",  text:"#f87171" };
}

function fmt(v, col) {
  const n = parseFloat(v);
  if (isNaN(n)) return "—";
  if (col === "plays") return n.toFixed(0);
  if (col === "total_yards") return n.toLocaleString();
  if (col.includes("epa")) return (n >= 0 ? "+" : "") + n.toFixed(3);
  if (Math.abs(n) < 1 && Math.abs(n) > 0.001) return (n*100).toFixed(1) + "%";
  return n.toFixed(2);
}

// ── Render table with fully inline styles ──
function renderTable() {
  const cols = views[currentView];
  const data = [...dataStore[currentSide]];

  if (sortState.col && cols.includes(sortState.col)) {
    data.sort((a,b) => {
      const A = parseFloat(a[sortState.col])||0;
      const B = parseFloat(b[sortState.col])||0;
      return sortState.asc ? A-B : B-A;
    });
  }

  const stats = {};
  cols.forEach(k => {
    if (k==="Team") return;
    const vals = data.map(d=>parseFloat(d[k])).filter(x=>!isNaN(x));
    stats[k] = { min:Math.min(...vals), max:Math.max(...vals) };
  });

  // Set table to min-content width so it never squishes — scroll handles overflow
  const table = document.getElementById('ntdTable');
  table.style.cssText = 'border-collapse:collapse;text-align:center;font-family:\'Roboto Condensed\',sans-serif;width:100%;min-width:' + (cols.length * 80) + 'px;';

  // TH styles fully inline
  const thStyle = 'padding:10px 12px;font-family:\'Roboto Condensed\',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#ffffff;background:#111d35;border-bottom:2px solid #1e3058;border-top:none;border-left:none;border-right:none;cursor:pointer;white-space:nowrap;user-select:none;';

  const thead = document.getElementById('ntdHead');
  thead.innerHTML =
    `<th style="${thStyle}width:32px;cursor:default;"></th>` +
    cols.map(c => {
      let sort = '';
      if (c === sortState.col) sort = sortState.asc ? ' ▲' : ' ▼';
      const align = c === "Team" ? 'text-align:left;padding-left:10px;' : '';
      return `<th data-col="${c}" style="${thStyle}${align}">${displayNames[c]||c}${sort ? '<span style="color:#3b82f6;font-size:9px;">' + sort + '</span>' : ''}</th>`;
    }).join("");

  // TD styles fully inline
  const tdBase = 'padding:7px 12px;font-family:\'Roboto Condensed\',sans-serif;font-size:14px;font-weight:800;color:#fff;border-bottom:1px solid rgba(30,48,88,0.4);border-top:none;border-left:none;border-right:none;white-space:nowrap;';

  const tbody = document.getElementById('ntdBody');
  tbody.innerHTML = data.map((row,idx) => {
    const team = (row.Team||"").trim().toUpperCase();
    const logo = teamLogos[team]||"";
    const rowBg = idx%2===0 ? '#0d1526' : '#060a14';

    let html = `<tr style="background:${rowBg};" onmouseover="this.style.background='rgba(59,130,246,0.12)'" onmouseout="this.style.background='${rowBg}'">`;
    // Rank cell
    html += `<td style="${tdBase}width:32px;font-size:11px;color:#64748b;text-align:center;">${idx+1}</td>`;
    // Team cell — logo + abbr, fully inline
    html += `<td style="${tdBase}padding:0;text-align:left;">
      <div style="display:flex;align-items:center;gap:8px;padding:0 0 0 8px;white-space:nowrap;">
        <img src="${logo}" alt="${team}" style="width:22px;height:22px;object-fit:contain;flex-shrink:0;display:block;" onerror="this.style.visibility='hidden'">
        <span style="font-family:'Roboto Condensed',sans-serif;font-size:13px;font-weight:800;color:#fff;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;">${team}</span>
      </div>
    </td>`;
    // Data cells
    cols.slice(1).forEach(col => {
      const val = parseFloat(row[col]);
      const c = cellColors(val, stats[col].min, stats[col].max, currentSide, col);
      const extraStyle = c ? `background:${c.bg};color:${c.text};` : 'color:#e2e8f0;';
      html += `<td style="${tdBase}${extraStyle}">${fmt(val,col)}</td>`;
    });
    return html + `</tr>`;
  }).join("");

  // Sort click handlers
  thead.querySelectorAll("th[data-col]").forEach(th => {
    th.addEventListener('mouseover', () => { th.style.background = 'rgba(59,130,246,0.2)'; });
    th.addEventListener('mouseout',  () => { th.style.background = '#111d35'; });
    th.onclick = () => {
      const col = th.dataset.col;
      if (col === "Team") return;
      sortState.asc = sortState.col === col ? !sortState.asc : false;
      sortState.col = col;
      renderTable();
    };
  });
}

buildControls();
loadAll();

})();
</script>
