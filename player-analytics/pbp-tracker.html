<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFL Play Explorer | xep.ai</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d1526;
  --bg2:     #111d35;
  --bg3:     #162040;
  --border:  #1e2d50;
  --accent:  #3b82f6;
  --accent2: #60a5fa;
  --gold:    #f59e0b;
  --green:   #22c55e;
  --red:     #ef4444;
  --orange:  #f97316;
  --purple:  #a78bfa;
  --cyan:    #22d3ee;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --muted2:  #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }

.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 13px 24px; display: flex; align-items: center; gap: 16px; }
.logo { font-size: 15px; font-weight: 700; color: var(--accent2); font-family: 'Roboto Condensed', sans-serif; text-decoration: none; }
.logo em { color: var(--gold); font-style: normal; }
.hdiv { width: 1px; height: 18px; background: var(--border); }
.htitle { font-size: 14px; font-weight: 600; color: var(--text); font-family: 'Roboto Condensed', sans-serif; }
.hbadge { background: rgba(59,130,246,.15); color: var(--accent2); border: 1px solid rgba(59,130,246,.3); font-size: 10px; font-weight: 600; letter-spacing: .5px; padding: 2px 8px; border-radius: 20px; font-family: 'Roboto Condensed', sans-serif; }

.main { max-width: 1300px; margin: 0 auto; padding: 20px 24px; }

/* TABS */
.tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.tab { background: var(--bg2); border: 1px solid var(--border); color: var(--muted2); border-radius: 8px; padding: 9px 28px; font-size: 14px; font-weight: 700; font-family: 'Roboto Condensed', sans-serif; letter-spacing: .5px; cursor: pointer; transition: all .15s; }
.tab:hover { border-color: var(--accent); color: var(--accent2); }
.tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* PLAYER LIST */
.plist-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
.plist-hd { background: var(--bg3); padding: 9px 16px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--muted2); font-family: 'Roboto Condensed', sans-serif; display: flex; align-items: center; justify-content: space-between; }
.plist-hd span { color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 11px; }
.plist-scroll { max-height: 280px; overflow-y: auto; }
.plist-scroll::-webkit-scrollbar { width: 4px; }
.plist-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.pitem { display: flex; align-items: center; justify-content: space-between; padding: 9px 16px; border-bottom: 1px solid rgba(255,255,255,.03); cursor: pointer; transition: background .1s; width: 100%; gap: 10px; }
.pitem:last-child { border-bottom: none; }
.pitem:hover { background: rgba(59,130,246,.07); }
.pitem.active { background: rgba(59,130,246,.13); border-left: 3px solid var(--accent); }
.pitem .pn { font-size: 13px; font-weight: 600; color: #fff; font-family: 'Roboto Condensed', sans-serif; }
.pitem .pt { font-size: 11px; font-weight: 600; color: var(--muted2); background: rgba(255,255,255,.06); padding: 1px 6px; border-radius: 3px; flex-shrink: 0; }

/* PLAYER HEADER */
.player-hd { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.player-hd-left .pname { font-size: 22px; font-weight: 700; color: #fff; font-family: 'Roboto Condensed', sans-serif; line-height: 1; }
.player-hd-left .pmeta { font-size: 12px; color: var(--muted2); margin-top: 3px; }
.stats-row { display: flex; gap: 20px; flex-wrap: wrap; }
.stat-pill .sv { font-size: 17px; font-weight: 700; color: var(--accent2); font-family: 'Roboto Condensed', sans-serif; line-height: 1; text-align: center; }
.stat-pill .sv.gold  { color: var(--gold); }
.stat-pill .sv.green { color: var(--green); }
.stat-pill .sv.red   { color: var(--red); }
.stat-pill .sl { font-size: 10px; color: var(--muted2); margin-top: 2px; text-transform: uppercase; letter-spacing: .3px; text-align: center; }

/* FILTERS */
.fbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: flex-end; }
.fg { display: flex; flex-direction: column; gap: 3px; }
.fg label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .4px; text-transform: uppercase; }
.fg select { background: var(--bg2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 0 10px; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; height: 30px; }
.fg select:focus { border-color: var(--accent); }
.btn-r { background: transparent; border: 1px solid var(--border); color: var(--muted2); border-radius: 6px; padding: 0 14px; height: 30px; font-size: 12px; cursor: pointer; align-self: flex-end; transition: border-color .15s, color .15s; }
.btn-r:hover { border-color: var(--accent); color: var(--accent2); }
.hint { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 6px 14px; background: rgba(59,130,246,.07); border: 1px solid rgba(59,130,246,.18); border-radius: 8px; font-size: 12px; color: var(--accent2); font-weight: 500; }

/* TABLE */
.tw { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.ts { overflow-x: auto; overflow-y: auto; max-height: 1100px; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; border-spacing: 0; }
thead { position: sticky; top: 0; z-index: 2; }
thead tr { background: var(--bg3); }
th { font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--muted2); padding: 11px 20px; white-space: nowrap; cursor: pointer; user-select: none; font-family: 'Roboto Condensed', sans-serif; text-align: left; }
th.tc { text-align: center; }
th:hover { color: #fff; }
th.srt { color: #fff; }
.sa { font-size: 9px; margin-left: 3px; }
tbody tr { border-bottom: 1px solid rgba(255,255,255,.04); transition: background .1s; cursor: pointer; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(59,130,246,.07); }
td { padding: 9px 20px; white-space: nowrap; font-size: 14px; color: #fff; font-weight: 600; font-family: 'Roboto Condensed', sans-serif; text-align: left; }
td.tc { text-align: center; }
td.tc { text-align: center; }
.tf { padding: 8px 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }

/* WEEK/OPP CELL — side by side */
.wk-opp { display: flex; align-items: center; gap: 8px; }
.wk-opp .wklbl { font-size: 12px; color: var(--muted2); font-weight: 500; white-space: nowrap; }
.wk-opp .opplbl { font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; }

/* QTR/TIME CELL — side by side */
.qt { display: flex; align-items: center; justify-content: center; gap: 8px; }
.qt .qtrlbl { font-size: 12px; color: var(--muted2); font-weight: 500; }
.qt .timelbl { font-size: 14px; font-weight: 700; color: #fff; }

/* RESULT BADGES */
.rb { display: inline-block; padding: 3px 9px; border-radius: 4px; font-size: 12px; font-weight: 700; font-family: 'Roboto Condensed', sans-serif; }
.rb-TD    { background: rgba(34,197,94,.15);   color: var(--green);   border: 1px solid rgba(34,197,94,.3); }
.rb-CMP   { background: rgba(59,130,246,.12);  color: var(--accent2); border: 1px solid rgba(59,130,246,.25); }
.rb-INCMP { background: rgba(100,116,139,.1);  color: var(--muted2);  border: 1px solid rgba(100,116,139,.2); }
.rb-INT   { background: rgba(239,68,68,.15);   color: var(--red);     border: 1px solid rgba(239,68,68,.3); }
.rb-SACK  { background: rgba(249,115,22,.15);  color: var(--orange);  border: 1px solid rgba(249,115,22,.3); }
.rb-SCRM  { background: rgba(167,139,250,.15); color: var(--purple);  border: 1px solid rgba(167,139,250,.3); }
.rb-1ST   { background: rgba(34,197,94,.15);   color: var(--green);   border: 1px solid rgba(34,197,94,.3); }
.rb-GAIN  { background: rgba(100,116,139,.1);  color: var(--muted2);  border: 1px solid rgba(100,116,139,.2); }
.rb-TFL   { background: rgba(239,68,68,.15);   color: var(--red);     border: 1px solid rgba(239,68,68,.3); }
.rb-FUM   { background: rgba(249,115,22,.15);  color: var(--orange);  border: 1px solid rgba(249,115,22,.3); }

/* LOADING */
.ld { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 48px; color: var(--muted2); font-size: 13px; }
.sp { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.nd { display: flex; justify-content: center; padding: 48px; color: var(--muted); font-size: 13px; }
.pick-prompt { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; padding: 60px 24px; color: var(--muted2); font-size: 14px; text-align: center; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; }
.pick-prompt .pi { font-size: 34px; }

/* MODAL */
.ov { position: fixed; inset: 0; background: rgba(0,0,0,.65); backdrop-filter: blur(3px); z-index: 300; display: none; align-items: center; justify-content: center; padding: 16px; }
.ov.open { display: flex; }
.mo { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.6); }
.mo::-webkit-scrollbar { width: 4px; }
.mo::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.mo-hd { background: var(--bg3); padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; border-radius: 12px 12px 0 0; }
.mo-title { font-size: 13px; font-weight: 700; color: var(--accent2); font-family: 'Roboto Condensed', sans-serif; letter-spacing: .4px; text-transform: uppercase; margin-bottom: 5px; }
.mo-desc { font-size: 12px; color: var(--muted2); line-height: 1.5; max-width: 520px; }
.mo-x { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; flex-shrink: 0; margin-left: 12px; }
.mo-x:hover { color: #fff; }
.mo-bd { padding: 18px 20px; }
.mo-section { margin-bottom: 18px; }
.mo-sec-title { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); font-family: 'Roboto Condensed', sans-serif; }
.mo-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
.mo-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
.mo-card .mv { font-size: 17px; font-weight: 700; color: var(--accent2); line-height: 1; font-family: 'Roboto Condensed', sans-serif; }
.mo-card .mv.gold   { color: var(--gold); }
.mo-card .mv.green  { color: var(--green); }
.mo-card .mv.red    { color: var(--red); }
.mo-card .mv.purple { color: var(--purple); }
.mo-card .mv.cyan   { color: var(--cyan); }
.mo-card .ml { font-size: 10px; font-weight: 600; color: var(--muted2); margin-top: 3px; letter-spacing: .3px; text-transform: uppercase; }
.mo-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(30,45,80,.5); font-size: 13px; }
.mo-row:last-child { border-bottom: none; }
.mo-row .lbl { color: var(--muted2); font-weight: 500; }
.mo-row .val { font-weight: 700; color: #fff; font-family: 'Roboto Condensed', sans-serif; }

@media (max-width: 768px) {
  .main { padding: 10px 12px; }
  .tabs { flex-wrap: wrap; }
  .tab { padding: 8px 18px; font-size: 13px; }
  th { font-size: 10px; padding: 10px 10px; }
  td { padding: 9px 10px; font-size: 13px; }
  .mo-grid { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="#">xep<em>.</em>ai</a>
  <div class="hdiv"></div>
  <span class="htitle">NFL Play Explorer</span>
  <span class="hbadge">2025 SEASON</span>
</header>

<div class="main">
  <div class="tabs">
    <button class="tab active" onclick="switchPos('QB')">QB</button>
    <button class="tab" onclick="switchPos('RB')">RB</button>
    <button class="tab" onclick="switchPos('WR')">WR / TE</button>
    <input id="psearch" type="text" placeholder="Search player..." oninput="filterList(this.value)"
      style="margin-left:8px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:0 14px;font-family:'Inter',sans-serif;font-size:13px;outline:none;height:38px;width:200px;transition:border-color .15s;"
      onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
  </div>

  <div class="plist-wrap">
    <div class="plist-hd">
      <div id="plistHd">Select a Player</div>
      <span>Sorted A–Z by last name · Scrolls after 10</span>
    </div>
    <div class="plist-scroll" id="plist">
      <div class="ld"><div class="sp"></div>Loading…</div>
    </div>
  </div>

  <div id="rpanel">
    <div class="pick-prompt">
      <div class="pi">🏈</div>
      <div>Select a player above to view their play-by-play data</div>
    </div>
  </div>
</div>

<div class="ov" id="ov" onclick="ovClick(event)">
  <div class="mo">
    <div class="mo-hd">
      <div>
        <div class="mo-title" id="mT"></div>
        <div class="mo-desc" id="mD"></div>
      </div>
      <button class="mo-x" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="mo-bd" id="mB"></div>
  </div>
</div>

<script>
function fldPos(r) {
  const y = N(r.yardline_100);
  if (y == null) return '—';
  if (y === 50) return '50';
  if (y < 50) return `OPP ${y}`;
  return `${naS(r.posteam)} ${100 - y}`;
}

const URLS = {
  QB: 'https://raw.githubusercontent.com/PhillipMurovannyy/nfl-analytics/main/player-analytics/QPPBP26.csv',
  RB: 'https://raw.githubusercontent.com/PhillipMurovannyy/nfl-analytics/main/player-analytics/RBPBP26.csv',
  WR: 'https://raw.githubusercontent.com/PhillipMurovannyy/nfl-analytics/refs/heads/main/player-analytics/WRPBP26.csv',
};

let state = {
  pos: 'QB', data: { QB:null, RB:null, WR:null },
  player: null, sort: { k:'week', d:1 },
  filters: { week:'', result:'', down:'' },
};

function parseCSV(txt) {
  const lines = txt.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,''));
  return lines.slice(1).map(line => {
    const vals=[]; let cur='', q=false;
    for (const c of line) {
      if (c==='"') q=!q;
      else if (c===',' && !q) { vals.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    vals.push(cur.trim());
    const o={};
    headers.forEach((h,i) => { o[h]=(vals[i]??'').replace(/^"|"$/g,''); });
    return o;
  }).filter(r => Object.values(r).some(v=>v!==''));
}

const N    = v => { const x=parseFloat(v); return isNaN(x)?null:x; };
const fmt2 = v => v==null?'—':v.toFixed(2);
const fmtP = v => v==null?'—':(v*100).toFixed(1)+'%';
const na   = v => (!v||v==='NA'||v==='na')?null:v;
const naS  = v => na(v)||'—';

// Quarter-relative clock from game_seconds_remaining
function qtrClock(secs, qtr) {
  const s=N(secs), q=N(qtr);
  if (s==null||q==null) return '—';
  let rem;
  if (q<=4) rem = s - (4-q)*900;
  else rem = s;
  rem = Math.max(0, Math.min(rem, q<=4?900:300));
  const m=Math.floor(rem/60), sc=rem%60;
  return `${m}:${String(sc).padStart(2,'0')}`;
}

async function loadPos(pos) {
  if (state.data[pos]) return;
  try {
    const r = await fetch(URLS[pos]+'?t='+Date.now());
    state.data[pos] = parseCSV(await r.text());
  } catch(e) { state.data[pos]=[]; }
}

const pk = pos => pos==='QB'?'passer':pos==='RB'?'rusher':'receiver';

function buildPlayerList() {
  const pos=state.pos, data=state.data[pos]||[], key=pk(pos);
  const map={};
  data.forEach(r => {
    const k=na(r[key]); if (!k) return;
    if (!map[k]) map[k]={ short:k, full:na(r.display_name)||k, team:na(r.posteam)||'?' };
  });
  const players = Object.values(map).sort((a,b) => {
    const la=a.full.split(' ').pop(), lb=b.full.split(' ').pop();
    return la.localeCompare(lb);
  });
  const lbl = pos==='WR'?'WR / TE':pos;
  document.getElementById('plistHd').textContent = `${lbl} — ${players.length} Players`;
  if (!players.length) { document.getElementById('plist').innerHTML='<div style="padding:16px;color:var(--muted);font-size:12px;text-align:center">No players found</div>'; return; }
  document.getElementById('plist').innerHTML = players.map(p=>
    `<div class="pitem ${state.player===p.short?'active':''}" onclick="selPlayer('${p.short.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
      <span class="pn">${p.full}</span><span class="pt">${p.team}</span>
    </div>`
  ).join('');
}

function filterList(q) {
  const term = q.toLowerCase();
  document.querySelectorAll('.pitem').forEach(el => {
    const name = el.querySelector('.pn').textContent.toLowerCase();
    el.style.display = name.includes(term) ? '' : 'none';
  });
}

async function switchPos(pos) {
  state.pos=pos; state.player=null;
  state.sort={k:'week',d:1}; state.filters={week:'',result:'',down:''};
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['QB','RB','WR'][i]===pos));
  const ps = document.getElementById('psearch'); if(ps) ps.value='';
  document.getElementById('plist').innerHTML='<div class="ld"><div class="sp"></div>Loading\u2026</div>';
  document.getElementById('rpanel').innerHTML='<div class="pick-prompt"><div class="pi">🏈</div><div>Select a player above to view their play-by-play data</div></div>';
  await loadPos(pos);
  buildPlayerList();
}

function selPlayer(short) {
  state.player=short; state.filters={week:'',result:'',down:''}; state.sort={k:'week',d:1};
  buildPlayerList(); renderPanel();
}

function renderPanel() {
  const pos=state.pos, data=state.data[pos]||[], key=pk(pos);
  const rows=data.filter(r=>na(r[key])===state.player);
  if (!rows.length) { document.getElementById('rpanel').innerHTML='<div class="nd">No plays found.</div>'; return; }

  const fullName=na(rows[0].display_name)||state.player;
  const team=na(rows[0].posteam)||'';

  const weeks   = [...new Set(rows.map(r=>r.week).filter(Boolean))].sort((a,b)=>+a-+b);
  const results = [...new Set(rows.map(r=>r.result_label).filter(na))].sort();
  const downs   = [...new Set(rows.map(r=>r.down).filter(v=>v&&v!='NA'))].sort((a,b)=>+a-+b);

  let filtered = rows.filter(r => {
    if (state.filters.week   && r.week!==state.filters.week) return false;
    if (state.filters.result && r.result_label!==state.filters.result) return false;
    if (state.filters.down   && r.down!==state.filters.down) return false;
    return true;
  });

  const {k,d}=state.sort;
  const numK=['week','qtr','down','ydstogo','yardline_100','yards_gained','air_yards','epa','cp','cpoe','game_seconds_remaining'];
  filtered=[...filtered].sort((a,b)=>{
    let av=a[k],bv=b[k];
    if (numK.includes(k)){av=N(av)??-Infinity;bv=N(bv)??-Infinity;}
    else{av=(av||'').toLowerCase();bv=(bv||'').toLowerCase();}
    return av===bv?0:av<bv?-d:d;
  });

  const ar  = key => key===k?`<span class="sa">${d===1?'&#9650;':'&#9660;'}</span>`:'';
  const TH  = (key,lbl,center=false) =>
    `<th onclick="thClick('${key}')" class="${k===key?'srt':''} ${center?'tc':''}">${lbl}${ar(key)}</th>`;

  document.getElementById('rpanel').innerHTML = `
    <div class="player-hd">
      <div class="player-hd-left">
        <div class="pname">${fullName} <span style="font-size:14px;color:var(--muted2);font-weight:400">${team}</span></div>
        <div class="pmeta">${rows.length} plays &middot; ${pos==='WR'?'WR/TE':pos}</div>
      </div>
      <div class="stats-row">${buildSummary(rows,pos)}</div>
    </div>
    <div class="fbar">
      <div class="fg"><label>Week</label>
        <select onchange="setF('week',this.value)">
          <option value="">All Weeks</option>
          ${weeks.map(w=>`<option value="${w}" ${state.filters.week==w?'selected':''}>Wk ${w}</option>`).join('')}
        </select>
      </div>
      <div class="fg"><label>Result</label>
        <select onchange="setF('result',this.value)">
          <option value="">All Results</option>
          ${results.map(r=>`<option value="${r}" ${state.filters.result==r?'selected':''}>${r}</option>`).join('')}
        </select>
      </div>
      <div class="fg"><label>Down</label>
        <select onchange="setF('down',this.value)">
          <option value="">All Downs</option>
          ${downs.map(dn=>`<option value="${dn}" ${state.filters.down==dn?'selected':''}>${ord(+dn)} Down</option>`).join('')}
        </select>
      </div>
      <button class="btn-r" onclick="resetF()">Reset</button>
    </div>
    <div class="hint">&#128070; Click any row for advanced play details</div>
    ${buildTable(filtered,pos,TH)}
  `;
}

function buildSummary(rows,pos) {
  const pills=arr=>arr.map(([l,v,c])=>
    `<div class="stat-pill"><div class="sv ${c||''}">${v}</div><div class="sl">${l}</div></div>`
  ).join('');
  if (pos==='QB') {
    const passes=rows.filter(r=>r.result_label!=='SACK'&&r.result_label!=='SCRM');
    const cmps=rows.filter(r=>r.result_label==='CMP'||r.result_label==='TD');
    const tds=rows.filter(r=>r.result_label==='TD');
    const ints=rows.filter(r=>r.result_label==='INT');
    const avg=rows.reduce((s,r)=>s+(N(r.epa)||0),0)/rows.length;
    return pills([['Plays',rows.length,''],['CMP%',passes.length?(cmps.length/passes.length*100).toFixed(1)+'%':'—','gold'],['TDs',tds.length,'green'],['INTs',ints.length,ints.length>0?'red':''],['Avg EPA',avg.toFixed(2),avg>=0?'green':'red']]);
  }
  if (pos==='RB') {
    const tds=rows.filter(r=>r.result_label==='TD');
    const fds=rows.filter(r=>r.result_label==='1ST');
    const avgY=(rows.reduce((s,r)=>s+(N(r.yards_gained)||0),0)/rows.length).toFixed(1);
    const avgE=(rows.reduce((s,r)=>s+(N(r.epa)||0),0)/rows.length).toFixed(2);
    return pills([['Carries',rows.length,''],['Avg Yds',avgY,'gold'],['TDs',tds.length,'green'],['1st Downs',fds.length,''],['Avg EPA',avgE,+avgE>=0?'green':'red']]);
  }
  const cmps=rows.filter(r=>r.result_label==='CMP'||r.result_label==='TD');
  const tds=rows.filter(r=>r.result_label==='TD');
  const avgA=(rows.reduce((s,r)=>s+(N(r.air_yards)||0),0)/rows.length).toFixed(1);
  const avgE=(rows.reduce((s,r)=>s+(N(r.epa)||0),0)/rows.length).toFixed(2);
  return pills([['Targets',rows.length,''],['Catches',cmps.length,'gold'],['TDs',tds.length,'green'],['Avg AY',avgA,''],['Avg EPA',avgE,+avgE>=0?'green':'red']]);
}

function buildTable(rows,pos,TH) {
  const wkCell = r =>
    `<td><div class="wk-opp"><span class="wklbl">Week ${r.week||'—'}</span><span class="opplbl">vs ${naS(r.defteam)}</span></div></td>`;
  const qtCell = r =>
    `<td class="tc"><div class="qt"><span class="qtrlbl">${naS(r.qtr_label)}</span><span class="timelbl">${qtrClock(r.game_seconds_remaining,r.qtr)}</span></div></td>`;

  let thead='', tbody='';
  if (pos==='QB') {
    thead=`<tr>${TH('week','Week / Opp')}${TH('game_seconds_remaining','Qtr / Time',true)}${TH('field_position','Field',true)}${TH('down_distance','D & D',true)}${TH('receiver','Target')}${TH('result_label','Result',true)}${TH('yards_gained','Yds',true)}</tr>`;
    tbody=rows.map((r,i)=>`<tr onclick="openModal(${i})">${wkCell(r)}${qtCell(r)}<td class="tc">${fldPos(r)}</td><td class="tc">${naS(r.down_distance)}</td><td>${naS(r.receiver)}</td><td class="tc"><span class="rb rb-${r.result_label||'INCMP'}">${r.result_label||'—'}</span></td><td class="tc">${r.yards_gained||'0'}</td></tr>`).join('');
  } else if (pos==='RB') {
    thead=`<tr>${TH('week','Week / Opp')}${TH('game_seconds_remaining','Qtr / Time',true)}${TH('field_position','Field',true)}${TH('down_distance','D & D',true)}${TH('result_label','Result',true)}${TH('yards_gained','Yds',true)}</tr>`;
    tbody=rows.map((r,i)=>`<tr onclick="openModal(${i})">${wkCell(r)}${qtCell(r)}<td class="tc">${fldPos(r)}</td><td class="tc">${naS(r.down_distance)}</td><td class="tc"><span class="rb rb-${r.result_label||'GAIN'}">${r.result_label||'—'}</span></td><td class="tc">${r.yards_gained||'0'}</td></tr>`).join('');
  } else {
    thead=`<tr>${TH('week','Week / Opp')}${TH('game_seconds_remaining','Qtr / Time',true)}${TH('field_position','Field',true)}${TH('down_distance','D & D',true)}${TH('passer','Passer')}${TH('result_label','Result',true)}${TH('yards_gained','Yds',true)}</tr>`;
    tbody=rows.map((r,i)=>`<tr onclick="openModal(${i})">${wkCell(r)}${qtCell(r)}<td class="tc">${fldPos(r)}</td><td class="tc">${naS(r.down_distance)}</td><td>${naS(r.passer)}</td><td class="tc"><span class="rb rb-${r.result_label||'INCMP'}">${r.result_label||'—'}</span></td><td class="tc">${r.yards_gained||'0'}</td></tr>`).join('');
  }
  return `<div class="tw"><div class="ts"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div><div class="tf"><span>${rows.length} play${rows.length!==1?'s':''}</span><span>Click any row for advanced details</span></div></div>`;
}

function thClick(k) { state.sort.k===k?state.sort.d*=-1:(state.sort.k=k,state.sort.d=1); renderPanel(); }
function setF(k,v) { state.filters[k]=v; renderPanel(); }
function resetF() { state.filters={week:'',result:'',down:''}; renderPanel(); }

function openModal(idx) {
  const pos=state.pos, data=state.data[pos]||[], key=pk(pos);
  const rows=data.filter(r=>na(r[key])===state.player);
  const {k,d}=state.sort;
  const numK=['week','qtr','down','ydstogo','yardline_100','yards_gained','air_yards','epa','cp','cpoe','game_seconds_remaining'];
  let filtered=rows.filter(r=>{
    if(state.filters.week&&r.week!==state.filters.week)return false;
    if(state.filters.result&&r.result_label!==state.filters.result)return false;
    if(state.filters.down&&r.down!==state.filters.down)return false;
    return true;
  }).sort((a,b)=>{
    let av=a[k],bv=b[k];
    if(numK.includes(k)){av=N(av)??-Infinity;bv=N(bv)??-Infinity;}
    else{av=(av||'').toLowerCase();bv=(bv||'').toLowerCase();}
    return av===bv?0:av<bv?-d:d;
  });
  const r=filtered[idx]; if(!r) return;
  const clock=qtrClock(r.game_seconds_remaining,r.qtr);
  document.getElementById('mT').textContent=`Wk ${r.week} \u00b7 ${naS(r.qtr_label)} \u00b7 ${clock} \u00b7 ${naS(r.down_distance)}`;
  document.getElementById('mD').textContent=r.desc||'';
  let b='';
  if (pos==='QB') {
    b+=cards([{v:naS(r.result_label),l:'Result',c:''},{v:r.yards_gained||'0',l:'Yards',c:'gold'},{v:na(r.epa)!=null?fmt2(N(r.epa)):'—',l:'EPA',c:N(r.epa)>=0?'green':'red'},{v:na(r.air_yards)!=null?r.air_yards:'—',l:'Air Yards',c:'cyan'},{v:na(r.yards_after_catch)!=null?r.yards_after_catch:'—',l:'YAC',c:''},{v:na(r.cp)!=null?fmtP(N(r.cp)):'—',l:'Comp Prob',c:''}]);
    b+=sec('Situation',[['Opponent',naS(r.defteam)],['Field Position',fldPos(r)],['Score Diff',naS(r.score_differential)],['Target',naS(r.receiver)],['Pass Location',naS(r.pass_location)],['Pass Length',naS(r.pass_length)]]);
    b+=sec('Advanced',[['CPOE',na(r.cpoe)!=null?r.cpoe+'%':'—'],['QB EPA',na(r.qb_epa)!=null?fmt2(N(r.qb_epa)):'—'],['QB Hit',r.qb_hit==='1'?'Yes':'No'],['Scramble',r.qb_scramble==='1'?'Yes':'No'],['Success',r.success==='1'?'Yes':'No'],['xPass',na(r.xpass)!=null?fmtP(N(r.xpass)):'—']]);
  } else if (pos==='RB') {
    b+=cards([{v:naS(r.result_label),l:'Result',c:''},{v:r.yards_gained||'0',l:'Yards',c:'gold'},{v:na(r.epa)!=null?fmt2(N(r.epa)):'—',l:'EPA',c:N(r.epa)>=0?'green':'red'},{v:naS(r.run_location),l:'Direction',c:''},{v:naS(r.run_gap),l:'Gap',c:''},{v:r.success==='1'?'Yes':'No',l:'Success',c:r.success==='1'?'green':''}]);
    b+=sec('Situation',[['Opponent',naS(r.defteam)],['Field Position',fldPos(r)],['Score Diff',naS(r.score_differential)],['TFL',r.tackled_for_loss==='1'?'Yes':'No'],['Fumble',r.fumble==='1'?'Yes':'No']]);
    b+=sec('Tackler',[['Primary',naS(r.tackler)],['Solo #1',naS(r.solo_tackle_1_player_name)],['Solo #2',naS(r.solo_tackle_2_player_name)],['Assist #1',naS(r.assist_tackle_1_player_name)]]);
  } else {
    b+=cards([{v:naS(r.result_label),l:'Result',c:''},{v:r.yards_gained||'0',l:'Yards',c:'gold'},{v:na(r.epa)!=null?fmt2(N(r.epa)):'—',l:'EPA',c:N(r.epa)>=0?'green':'red'},{v:na(r.air_yards)!=null?r.air_yards:'—',l:'Air Yards',c:'cyan'},{v:na(r.yards_after_catch)!=null?r.yards_after_catch:'—',l:'YAC',c:'purple'},{v:na(r.cp)!=null?fmtP(N(r.cp)):'—',l:'Comp Prob',c:''}]);
    b+=sec('Situation',[['Opponent',naS(r.defteam)],['Field Position',fldPos(r)],['QB',naS(r.passer)],['Pass Location',naS(r.pass_location)],['Pass Length',naS(r.pass_length)],['Score Diff',naS(r.score_differential)]]);
    b+=sec('Advanced',[['CPOE',na(r.cpoe)!=null?r.cpoe+'%':'—'],['xYAC',na(r.xyac_mean_yardage)!=null?N(r.xyac_mean_yardage).toFixed(2):'—'],['xYAC Success',na(r.xyac_success)!=null?fmtP(N(r.xyac_success)):'—'],['xYAC 1st Down',na(r.xyac_fd)!=null?fmtP(N(r.xyac_fd)):'—'],['QB Hit',r.qb_hit==='1'?'Yes':'No'],['Defender',naS(r.defender)]]);
  }
  document.getElementById('mB').innerHTML=b;
  document.getElementById('ov').classList.add('open');
}

function cards(items){return`<div class="mo-grid">${items.map(c=>`<div class="mo-card"><div class="mv ${c.c}">${c.v}</div><div class="ml">${c.l}</div></div>`).join('')}</div>`;}
function sec(title,rows){return`<div class="mo-section"><div class="mo-sec-title">${title}</div>${rows.map(([l,v])=>`<div class="mo-row"><span class="lbl">${l}</span><span class="val">${v}</span></div>`).join('')}</div>`;}
function ovClick(e){if(e.target===document.getElementById('ov'))closeModal();}
function closeModal(){document.getElementById('ov').classList.remove('open');}
function ord(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

(async()=>{ await loadPos('QB'); buildPlayerList(); })();
</script>
