<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFL Player Comparison | xEP Network</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a14;--surface:#0d1526;--surface2:#0a1120;
  --border:#1e3058;--border2:#2a4070;
  --blue:#3b82f6;--blue-glow:rgba(59,130,246,0.13);
  --header-bg:#0e1e4a;--gold:#f59e0b;
  --text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#4e6080;
  --p0:#3b82f6;--p1:#f59e0b;--p2:#22c55e;--p3:#a855f7;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Roboto Condensed',sans-serif;overflow-x:hidden;}
.page{width:100%;max-width:1350px;margin:0 auto;padding:0 20px 60px;}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;gap:14px;
  padding:14px 0 12px;border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:10px;}
.brand img{
  height:30px;
  filter:drop-shadow(0 0 8px rgba(59,130,246,.4));opacity:.95;
  /* hide on mobile */
}
.brand-text{}
.brand-title{font-size:18px;font-weight:900;text-transform:uppercase;letter-spacing:3px;color:#fff;line-height:1;}
.brand-sub{font-size:10px;color:#5a7aa0;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.topbar-badge{
  margin-left:auto;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--blue);background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);
  border-radius:6px;padding:4px 10px;white-space:nowrap;flex-shrink:0;
}

/* ── CONTROLS ── */
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;row-gap:8px;padding:12px 0 10px;}
.pos-switcher{display:flex;gap:3px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:3px;flex-shrink:0;}
.pos-btn{background:none;border:1px solid transparent;cursor:pointer;font-family:'Roboto Condensed',sans-serif;font-weight:900;font-size:14px;letter-spacing:2px;text-transform:uppercase;padding:7px 18px;border-radius:7px;transition:all .18s;color:#7a9dc0;white-space:nowrap;}
.pos-btn:hover{color:#c8ddf0;background:rgba(255,255,255,.04);}
.pos-btn.active-QB{background:rgba(59,130,246,.2);color:#60a5fa;border-color:rgba(59,130,246,.4);}
.pos-btn.active-RB{background:rgba(34,197,94,.2);color:#4ade80;border-color:rgba(34,197,94,.4);}
.pos-btn.active-WR{background:rgba(245,158,11,.2);color:#fbbf24;border-color:rgba(245,158,11,.4);}
.pos-btn.active-TE{background:rgba(168,85,247,.2);color:#c084fc;border-color:rgba(168,85,247,.4);}

.screenshot-btn{
  margin-left:auto;display:none;align-items:center;gap:7px;
  background:rgba(59,130,246,.12);border:1.5px solid rgba(59,130,246,.3);
  color:#60a5fa;border-radius:8px;padding:8px 16px;cursor:pointer;
  font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:12px;
  letter-spacing:1.2px;text-transform:uppercase;transition:all .18s;white-space:nowrap;
}
.screenshot-btn:hover{background:rgba(59,130,246,.22);}
.screenshot-btn svg{flex-shrink:0;}

/* ── PLAYER SLOTS ── */
.selectors{display:grid;gap:10px;margin-bottom:16px;}
@media(max-width:500px){.selectors{gap:8px;grid-template-columns:repeat(2,1fr)!important;}}
.player-slot{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px;position:relative;transition:border-color .2s;}
.player-slot.has-player{border-color:var(--slot-color,var(--border));}
.slot-label{font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--slot-color,var(--text-muted));margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.slot-dot{width:8px;height:8px;border-radius:50%;background:var(--slot-color,var(--border2));flex-shrink:0;}
.slot-search input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:#c8ddf0;font-family:'Roboto Condensed',sans-serif;font-size:13px;font-weight:600;padding:8px 10px;border-radius:7px;outline:none;transition:border-color .2s;}
.slot-search input:focus{border-color:var(--slot-color,var(--blue));}
.slot-search input::placeholder{color:#4e6a88;}
.slot-search{position:relative;}
.slot-dropdown{position:absolute;top:calc(100%+4px);left:0;right:0;background:#0d1e3a;border:1.5px solid var(--border2);border-radius:8px;z-index:100;max-height:200px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;display:none;}
.slot-dropdown.open{display:block;}
.drop-item{padding:8px 12px;cursor:pointer;font-size:13px;font-weight:600;color:#c8ddf0;border-bottom:1px solid rgba(42,64,112,.4);display:flex;align-items:center;justify-content:space-between;transition:background .12s;}
.drop-item:last-child{border-bottom:none;}
.drop-item:hover{background:rgba(59,130,246,.12);}
.drop-team{font-size:11px;color:#5a7aa0;font-weight:700;letter-spacing:.8px;}
.slot-selected{display:none;align-items:center;justify-content:space-between;gap:8px;}
.slot-selected.show{display:flex;}
.slot-sel-name{font-size:15px;font-weight:900;color:#fff;line-height:1.1;}
.slot-sel-team{font-size:11px;color:#6a88aa;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
.slot-clear{background:none;border:none;cursor:pointer;color:#4e6080;font-size:16px;line-height:1;padding:2px 4px;transition:color .15s;flex-shrink:0;}
.slot-clear:hover{color:#ef4444;}

/* ── CAT BAR ── */
.cat-bar{display:flex;gap:3px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:3px;margin-bottom:14px;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-btn{background:none;border:none;cursor:pointer;font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;padding:7px 16px;border-radius:6px;transition:all .18s;color:#7a9dc0;white-space:nowrap;flex-shrink:0;}
.cat-btn:hover{background:var(--blue-glow);color:#c8ddf0;}
.cat-btn.active{background:var(--blue);color:#fff;}

/* ── COMP TABLE ── */
#compCapture{border-radius:14px;overflow:hidden;border:1.5px solid var(--border);background:var(--surface);}
.comp-header{display:grid;background:var(--header-bg);border-bottom:1px solid var(--border2);padding:0;}
.comp-header-stat{padding:13px 16px;font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#7a9dc0;border-right:1px solid rgba(42,64,112,.3);min-width:160px;}
.comp-header-player{padding:14px 16px;text-align:center;border-right:1px solid rgba(42,64,112,.3);position:relative;}
.comp-header-player:last-child{border-right:none;}
.php-bar{position:absolute;top:0;left:0;right:0;height:3px;}
.php-name{font-size:15px;font-weight:900;color:#fff;line-height:1.1;margin-top:2px;}
.php-team{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#6a88aa;margin-top:2px;}
.comp-row{display:grid;border-bottom:1px solid rgba(30,48,88,.3);transition:background .1s;}
.comp-row:last-child{border-bottom:none;}
.comp-row:hover{background:rgba(59,130,246,.04);}
.comp-section{display:grid;background:rgba(14,30,74,.6);border-bottom:1px solid rgba(42,64,112,.4);border-top:1px solid rgba(42,64,112,.4);}
.comp-section-label{padding:7px 16px;font-size:10px;font-weight:900;letter-spacing:2.5px;text-transform:uppercase;color:#5a7aa0;grid-column:1/-1;}
.comp-stat-label{padding:12px 16px;font-size:13px;font-weight:700;color:var(--text-dim);display:flex;flex-direction:column;gap:2px;border-right:1px solid rgba(42,64,112,.2);min-width:160px;}
.comp-stat-desc{font-size:10px;color:var(--text-muted);font-weight:500;letter-spacing:.3px;}
.comp-cell{padding:12px 16px;text-align:center;font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;color:#e2e8f0;display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(42,64,112,.2);position:relative;transition:background .15s;}
.comp-cell:last-child{border-right:none;}
.comp-cell.best{color:#fff;font-weight:900;}
.comp-cell.best::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:28px;height:2px;border-radius:2px;background:var(--cell-accent,var(--blue));}
.comp-cell.empty{color:#2a4070;}
.cell-bar{position:absolute;inset:0;opacity:.08;transition:width .3s ease;pointer-events:none;}

/* ── PLACEHOLDER / LOADING ── */
.comp-placeholder{padding:60px 20px;text-align:center;color:var(--text-muted);}
.comp-placeholder-title{font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#2a4070;margin-bottom:8px;}
.comp-placeholder-sub{font-size:13px;color:#1e3058;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.loading-wrap{padding:50px;text-align:center;color:var(--text-muted);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LEGEND ── */
.legend{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:10px 0 0;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);}
.legend-item{display:flex;align-items:center;gap:6px;}
.legend-dot{width:10px;height:10px;border-radius:50%;}
.legend-best{display:flex;align-items:center;gap:6px;margin-left:auto;color:#5a7aa0;font-size:11px;font-weight:700;}
.legend-bar-demo{width:20px;height:2px;background:var(--blue);border-radius:2px;}

/* ══════════════════════════════════════════════
   H2H SOCIAL CARD
══════════════════════════════════════════════ */
#h2hCard{display:none;}
#h2hInner{
  background:linear-gradient(135deg,#060e22 0%,#0c1830 50%,#060e22 100%);
  border:1.5px solid #1e3058;
  border-radius:16px;
  overflow:hidden;
  position:relative;
  max-width:680px;
  margin:0 auto;
}
/* subtle grid bg */
#h2hInner::before{
  content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(59,130,246,0.03) 40px,rgba(59,130,246,0.03) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(59,130,246,0.03) 40px,rgba(59,130,246,0.03) 41px);
  pointer-events:none;
}
.h2h-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 12px;
  border-bottom:1px solid rgba(30,48,88,0.6);
  background:rgba(14,30,74,0.5);
  position:relative;z-index:1;
}
.h2h-pos-badge{
  font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;
  padding:4px 10px;border-radius:5px;
}
.h2h-title{font-size:13px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#5a7aa0;}
.h2h-brand{font-size:11px;font-weight:700;letter-spacing:2px;color:#3b82f6;text-transform:uppercase;}

/* player name headers */
.h2h-players{
  display:grid;
  position:relative;z-index:1;
}
.h2h-player-hdr{
  padding:16px 12px 14px;
  text-align:center;
  position:relative;
}
.h2h-player-hdr::after{
  content:'';
  display:none;
}
.h2h-player-hdr:last-child::after{display:none;}
.h2h-accentbar{height:4px;border-radius:2px;margin:0 0 10px;width:60%;margin-left:auto;margin-right:auto;}
.h2h-pname{font-size:20px;font-weight:900;color:#fff;letter-spacing:1px;text-transform:uppercase;line-height:1;}
.h2h-pteam{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#5a7aa0;margin-top:4px;}

/* stat rows */
.h2h-stat-row{
  display:grid;
  position:relative;z-index:1;
}
.h2h-label-cell{
  display:flex;align-items:center;justify-content:center;
  padding:10px 8px;
  font-size:10px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
  color:#ffffff;
  background:rgba(14,30,74,0.5);
  text-align:center;
}
.h2h-val{
  padding:10px 12px;
  text-align:center;
  font-size:18px;font-weight:900;
  font-variant-numeric:tabular-nums;
  color:#8096b0;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  transition:color .15s;
}
.h2h-val.h2h-winner{
  color:#fff;
  background:rgba(59,130,246,0.06);
}
.h2h-val.h2h-winner::after{
  content:'';
  position:absolute;
  bottom:0;left:10%;right:10%;
  height:2px;border-radius:2px;
  background:var(--win-color,#3b82f6);
}

/* section divider */
.h2h-section-div{
  background:rgba(14,30,74,0.7);
  border-top:1px solid rgba(42,64,112,0.5);
  padding:5px 16px;
  font-size:9px;font-weight:900;letter-spacing:2.5px;text-transform:uppercase;color:#2a4070;
  position:relative;z-index:1;
}

/* footer */
.h2h-footer{
  padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(6,10,20,0.6);
  border-top:1px solid rgba(30,48,88,0.5);
  position:relative;z-index:1;
}
.h2h-footer-left{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#2a4070;}
.h2h-footer-right{font-size:11px;font-weight:900;letter-spacing:2px;color:#3b82f6;text-transform:uppercase;}

/* Save button */
.h2h-save-btn{
  display:flex;align-items:center;gap:8px;margin:14px auto 0;
  background:rgba(59,130,246,.15);border:1.5px solid rgba(59,130,246,.35);
  color:#60a5fa;border-radius:8px;padding:9px 22px;cursor:pointer;
  font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:13px;
  letter-spacing:1.2px;text-transform:uppercase;transition:all .18s;
}
.h2h-save-btn:hover{background:rgba(59,130,246,.25);}

/* placeholder for H2H */
.h2h-placeholder{
  padding:60px 20px;text-align:center;
  border:1.5px solid var(--border);border-radius:14px;background:var(--surface);
}
.h2h-placeholder p{font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#2a4070;}
.h2h-placeholder span{font-size:12px;color:#1e3058;font-weight:600;letter-spacing:1px;text-transform:uppercase;display:block;margin-top:6px;}

/* ── MOBILE ── */
@media(max-width:680px){
  .page{padding:0 10px 40px;}
  /* Fix broken header — no logo, compact title */
  .brand img{display:none;}
  .brand-title{font-size:16px;letter-spacing:2px;}
  .brand-sub{font-size:9px;}
  .pos-btn{font-size:12px;padding:6px 11px;}
  .cat-btn{font-size:11px;padding:6px 10px;}
  .screenshot-btn{display:flex;padding:7px 12px;font-size:11px;}
  .selectors{gap:7px;}
  .player-slot{padding:10px;}
  .slot-search input{font-size:14px;padding:8px 9px;}
  .comp-stat-label{min-width:110px;padding:10px 10px;font-size:12px;}
  .comp-stat-desc{display:none;}
  .comp-cell{font-size:14px;padding:10px 8px;}
  .comp-header-stat{min-width:110px;padding:11px 10px;font-size:10px;}
  .comp-header-player{padding:11px 8px;}
  .php-name{font-size:13px;}
  .php-team{font-size:10px;}
  /* H2H card mobile */
  .h2h-pname{font-size:15px;}
  .h2h-val{font-size:15px;padding:9px 8px;}
  .h2h-label-cell{font-size:9px;padding:9px 6px;color:#ffffff;}
}
@media(max-width:400px){
  .selectors{grid-template-columns:1fr 1fr!important;}
  .comp-stat-label{min-width:90px;font-size:11px;}
  .comp-cell{font-size:13px;padding:9px 6px;}
  .brand-title{font-size:14px;letter-spacing:1.5px;}
}
</style>
</head>
<body>
<div class="page">

  <!-- TOP BAR — logo hidden on mobile via CSS, title always visible -->
  <div class="topbar">
    <div class="brand">
      <img src="https://xep.ai/wp-content/uploads/2024/07/Logo-PNG-2-1.png" alt="xEP" onerror="this.style.display='none'">
      <div class="brand-text">
        <div class="brand-title">Player Comparison</div>
        <div class="brand-sub">2025-26 Season &nbsp;·&nbsp; Data: xEP Network</div>
      </div>
    </div>
    <span class="topbar-badge" id="dataStatus">Loading...</span>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="pos-switcher" id="posSwitcher">
      <button class="pos-btn" data-pos="QB">QB</button>
      <button class="pos-btn" data-pos="RB">RB</button>
      <button class="pos-btn" data-pos="WR">WR</button>
      <button class="pos-btn" data-pos="TE">TE</button>
    </div>
    <button class="screenshot-btn" id="screenshotBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/></svg>
      Screenshot
    </button>
  </div>

  <!-- PLAYER SLOTS -->
  <div class="selectors" id="selectors"></div>

  <!-- CATEGORY TABS -->
  <div class="cat-bar" id="catBar"></div>

  <!-- LEGEND (shown only for comparison tab) -->
  <div class="legend" id="legend" style="display:none">
    <div id="legendPlayers"></div>
    <div class="legend-best"><div class="legend-bar-demo"></div>Underline = best</div>
  </div>

  <!-- COMPARISON TABLE -->
  <div style="margin-top:10px;" id="compSection">
    <div id="compCapture">
      <div class="comp-placeholder" id="compPlaceholder">
        <div class="comp-placeholder-title">Select Players to Compare</div>
        <div class="comp-placeholder-sub">Choose 2–4 players of the same position above</div>
      </div>
      <div id="compTable" style="display:none"></div>
    </div>
  </div>

  <!-- H2H CARD (tab 2) -->
  <div id="h2hSection" style="display:none">
    <div id="h2hPlaceholder" class="h2h-placeholder">
      <p>Select 2 Players to Generate Card</p>
      <span>Choose any 2 players above to see the H2H comparison card</span>
    </div>
    <div id="h2hCard">
      <div id="h2hInner"></div>
      <div style="text-align:center">
        <button class="h2h-save-btn" id="h2hSaveBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Save Card
        </button>
      </div>
    </div>
  </div>

</div>

<script>
const PROXIES=[
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];
const SHEETS={
  QB:'https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1152850061&single=true&output=csv',
  RB:'https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1056171373&single=true&output=csv',
  REC:'https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1048851676&single=true&output=csv',
};
const PLAYER_COLORS=['#3b82f6','#f59e0b','#22c55e','#a855f7'];
const LOWER_IS_BETTER=new Set(['INT','bad_throws','throwaways','drops','times_pressured','pressure_pct','times_hurried','times_hit','Pct_Under3','avg_time_to_los']);

// ── H2H stat definitions per position ──
const H2H_STATS = {
  QB:[
    {sec:'Passing',stats:[
      {k:'YDS',lab:'PASS YDS',fmt:'int'},
      {k:'TD',lab:'TD',fmt:'int'},
      {k:'INT',lab:'INT',fmt:'int'},
      {k:'CMP%',lab:'CMP%',fmt:'pct'},
      {k:'EPA',lab:'EPA',fmt:'dec2'},
      {k:'CPOE',lab:'CPOE',fmt:'cpoe'},
    ]},
    {sec:'Efficiency',stats:[
      {k:'passer_rating',lab:'RATING',fmt:'dec1'},

async function fetchWithFallback(url){
  return Promise.any(PROXIES.map(p=>new Promise(async(res,rej)=>{
    try{
      const ctrl=new AbortController();
      const t=setTimeout(()=>ctrl.abort(),6000);
      const r=await fetch(p(url),{signal:ctrl.signal});
      clearTimeout(t);
      if(!r.ok)throw new Error('HTTP '+r.status);
      const txt=await r.text();
      if(!txt||txt.trim().length<50)throw new Error('empty');
      res(txt);
    }catch(e){rej(e);}
  })));
}
function parseCSV(txt){
  const lines=txt.trim().split(/\r?\n/);
  const headers=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
  const out=[];
  for(let i=1;i<lines.length;i++){
    const vals=csvSplit(lines[i]);
    if(!vals[0]&&!vals[1])continue;
    const obj={};
    headers.forEach((h,j)=>{obj[h]=(vals[j]||'').trim();});
    if(obj['display_name'])out.push(obj);
  }
  return out;
}
function csvSplit(line){
  const r=[];let q=false,c='';
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"')q=!q;
    else if(ch===','&&!q){r.push(c);c='';}
    else c+=ch;
  }
  r.push(c);return r;
}

function fmtVal(raw,fmt){
  if(raw===''||raw===undefined||raw===null)return'—';
  const n=+raw;if(isNaN(n))return'—';
  switch(fmt){
    case'int':  return Math.round(n).toLocaleString();
    case'dec1': return n.toFixed(1);
    case'dec2': return n.toFixed(2);
    case'dec2s':return n.toFixed(2)+'s';
    case'pct':  return(Math.abs(n)<=1.5?n*100:n).toFixed(1)+'%';
    case'cpoe': return n.toFixed(2)+'%';
    default:    return n.toFixed(1);
  }
}
function numVal(raw){const n=+raw;return isNaN(n)?null:n;}

async function loadData(){
  document.getElementById('dataStatus').textContent='Loading...';
  try{
    const [qb,rb,rec]=await Promise.all([
      fetchWithFallback(SHEETS.QB).then(parseCSV),
      fetchWithFallback(SHEETS.RB).then(parseCSV),
      fetchWithFallback(SHEETS.REC).then(parseCSV),
    ]);
    allData.QB=qb;allData.RB=rb;allData.WR=[];allData.TE=[];
    rec.forEach(r=>{
      const p=(r['player_position']||'WR').trim().toUpperCase();
      if(p==='TE')allData.TE.push(r);else allData.WR.push(r);
    });
    dataReady=true;
    const tot=qb.length+rb.length+allData.WR.length+allData.TE.length;
    document.getElementById('dataStatus').textContent=tot+' Players';
    renderSelectors();
    renderCurrentTab();
  }catch(e){
    document.getElementById('dataStatus').textContent='Load Failed';
    document.getElementById('dataStatus').style.color='#ef4444';
  }
}

const SLOT_NAMES=['Player 1','Player 2','Player 3','Player 4'];
function renderSelectors(){
  const container=document.getElementById('selectors');
  container.innerHTML='';
  const filledCount=state.players.filter(Boolean).length;
  const showCount=Math.min(4,filledCount+1);
  container.style.gridTemplateColumns=`repeat(${showCount},1fr)`;
  for(let i=0;i<showCount;i++){
    const color=PLAYER_COLORS[i];
    const player=state.players[i];
    const div=document.createElement('div');
    div.className='player-slot'+(player?' has-player':'');
    div.style.setProperty('--slot-color',color);
    div.innerHTML=`
      <div class="slot-label"><span class="slot-dot"></span>${SLOT_NAMES[i]}</div>
      <div class="slot-search" id="slotSearch${i}" style="${player?'display:none':''}">
        <input type="text" placeholder="Search ${state.pos}..." autocomplete="off" id="slotInput${i}" data-slot="${i}">
        <div class="slot-dropdown" id="slotDrop${i}"></div>
      </div>
      <div class="slot-selected ${player?'show':''}" id="slotSel${i}">
        <div class="slot-selected-info">
          <div class="slot-sel-name">${player?player['display_name']:''}</div>
          <div class="slot-sel-team">${player?(player['posteam']||player['team_abbr']||''):''}</div>
        </div>
        <button class="slot-clear" data-slot="${i}" title="Remove">✕</button>
      </div>`;
    container.appendChild(div);
  }
  for(let i=0;i<showCount;i++){
    const inp=document.getElementById(`slotInput${i}`);
    if(!inp)continue;
    const drop=document.getElementById(`slotDrop${i}`);
    inp.addEventListener('input',()=>handleSlotSearch(i,inp.value,drop));
    inp.addEventListener('focus',()=>{if(inp.value)handleSlotSearch(i,inp.value,drop);});
    inp.addEventListener('keydown',e=>{if(e.key==='Escape'){drop.classList.remove('open');inp.blur();}});
  }
  document.querySelectorAll('.slot-clear').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const i=+btn.dataset.slot;
      state.players.splice(i,1);state.players.push(null);
      renderSelectors();renderCurrentTab();
    });
  });
}
function handleSlotSearch(slot,query,drop){
  const q=query.trim().toLowerCase();
  if(!q||!dataReady){drop.classList.remove('open');return;}
  const results=allData[state.pos].filter(p=>(p['display_name']||'').toLowerCase().includes(q)).slice(0,20);
  if(!results.length){drop.classList.remove('open');return;}
  drop.innerHTML=results.map(p=>{
    const team=(p['posteam']||p['team_abbr']||'').toUpperCase();
    return`<div class="drop-item" data-slot="${slot}" data-name="${p['display_name']}"><span>${p['display_name']}</span><span class="drop-team">${team}</span></div>`;
  }).join('');
  drop.classList.add('open');
  drop.querySelectorAll('.drop-item').forEach(item=>{
    item.addEventListener('mousedown',e=>{
      e.preventDefault();
      const player=allData[state.pos].find(p=>p['display_name']===item.dataset.name);
      if(player){state.players[+item.dataset.slot]=player;drop.classList.remove('open');renderSelectors();renderCurrentTab();}
    });
  });
}

  if(active.length<2){

  // Use first two players
  const p0=state.players.find(Boolean);
  const p1Idx=state.players.findIndex((p,i)=>p&&p!==p0);
  const p1=state.players[p1Idx];
  const c0=PLAYER_COLORS[state.players.indexOf(p0)];
  const c1=PLAYER_COLORS[p1Idx];

  const pos=state.pos;
  const pcolor=POS_COLORS[pos];
  const statDefs=H2H_STATS[pos];

  let html='';

  // Topbar
  html+=`<div class="h2h-topbar">

  html+=`<div class="h2h-players" style="display:grid;grid-template-columns:${colW};">

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return`${r},${g},${b}`;
}

      link.href=canvas.toDataURL('image/png');
      link.click();
    }else{
      window.print();
    }
  }catch(e){}
  btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Save Card';
});

// ── COMPARISON TABLE ──
function renderComparison(catIdx){
  const activePlayers=state.players.filter(Boolean);
  const placeholder=document.getElementById('compPlaceholder');
  const table=document.getElementById('compTable');
  const legend=document.getElementById('legend');

  if(activePlayers.length<2){
    placeholder.style.display='block';table.style.display='none';legend.style.display='none';
    return;
  }
  placeholder.style.display='none';table.style.display='block';legend.style.display='flex';

  const slots=state.players.filter(Boolean);
  const nCols=slots.length;
  const defs=COMP_DEFS[state.pos][catIdx]||COMP_DEFS[state.pos][0];
  const statColWidth=window.innerWidth<=680?'100px':'160px';
  const gridTemplate=`${statColWidth} repeat(${nCols},1fr)`;

  let html='';

  // Header
  html+=`<div class="comp-header" style="grid-template-columns:${gridTemplate}"><div class="comp-header-stat">STAT</div>`;
  for(let i=0;i<nCols;i++){
    const p=slots[i];const colorIdx=state.players.indexOf(p);const color=PLAYER_COLORS[colorIdx];
    const name=p['display_name']||'';const team=(p['posteam']||p['team_abbr']||'').toUpperCase();
    html+=`<div class="comp-header-player"><div class="php-bar" style="background:${color}"></div><div class="php-name">${name}</div><div class="php-team">${team}</div></div>`;
  }
  html+='</div>';

  for(const section of defs.sections){
    html+=`<div class="comp-section" style="grid-template-columns:${gridTemplate}"><div class="comp-section-label">${section.sec}</div></div>`;
    for(const stat of section.stats){
      const vals=slots.map(p=>numVal(p[stat.k]));
      const defined=vals.filter(v=>v!==null);
      let bestVal=null;
      if(defined.length>=2)bestVal=LOWER_IS_BETTER.has(stat.k)?Math.min(...defined):Math.max(...defined);
      const minV=defined.length?Math.min(...defined):0;
      const maxV=defined.length?Math.max(...defined):1;
      const range=maxV-minV||1;
      html+=`<div class="comp-row" style="grid-template-columns:${gridTemplate}">`;
      html+=`<div class="comp-stat-label"><span>${stat.lab}</span><span class="comp-stat-desc">${stat.desc}</span></div>`;
      for(let i=0;i<nCols;i++){
        const p=slots[i];const colorIdx=state.players.indexOf(p);const color=PLAYER_COLORS[colorIdx];
        const raw=p[stat.k];const nv=numVal(raw);const display=fmtVal(raw,stat.fmt);
        const isBest=bestVal!==null&&nv!==null&&Math.abs(nv-bestVal)<0.0001;
        let barPct=0;
        if(nv!==null&&defined.length>1){
          barPct=LOWER_IS_BETTER.has(stat.k)?((maxV-nv)/range)*100:((nv-minV)/range)*100;
          barPct=Math.max(5,Math.min(100,barPct));
        }
        html+=`<div class="comp-cell${isBest?' best':''}" style="--cell-accent:${color}">
          ${barPct>0?`<div class="cell-bar" style="background:${color};width:${barPct}%"></div>`:''}
          <span style="position:relative;z-index:1">${display}</span>
        </div>`;
      }
      html+='</div>';
    }
  }
  table.innerHTML=html;

  const lp=document.getElementById('legendPlayers');
  lp.innerHTML=activePlayers.map(p=>{
    const colorIdx=state.players.indexOf(p);
    return`<span class="legend-item"><span class="legend-dot" style="background:${PLAYER_COLORS[colorIdx]}"></span>${p['display_name'].split(' ').pop()}</span>`;
  }).join('');
}

      const canvas=await html2canvas(document.getElementById('compCapture'),{backgroundColor:'#0d1526',scale:2,useCORS:true,logging:false});

});

// ── POSITION SWITCHER ──
document.getElementById('posSwitcher').addEventListener('click',e=>{
  const b=e.target.closest('.pos-btn');if(!b)return;
  state.pos=b.dataset.pos;state.cat=0;state.players=[null,null,null,null];
  document.querySelectorAll('.pos-btn').forEach(btn=>{
    btn.className='pos-btn'+(btn.dataset.pos===state.pos?' active-'+state.pos:'');
  });
  renderCatBar();renderSelectors();renderCurrentTab();
});
