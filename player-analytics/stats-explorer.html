<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFL Stats Explorer | xEP Network</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a14;--surface:#0d1526;
  --border:#1e3058;--border2:#2a4070;
  --blue:#3b82f6;--blue-glow:rgba(59,130,246,0.13);
  --header-bg:#0e1e4a;--gold:#f59e0b;
  --text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#4e6080;
  /* sticky col widths — change in ONE place */
  --w-rank:36px;
  --w-player:160px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{overflow-x:hidden;}  /* hard stop — page never scrolls sideways */
body{
  overflow-x:hidden;      /* belt AND suspenders */
  background:var(--bg);color:var(--text);
  font-family:'Roboto Condensed',sans-serif;
}

/* ── PAGE ── */
.page{
  position:relative;z-index:1;
  width:100%;max-width:1350px;
  margin:0 auto;
  padding:0 16px 40px;
}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;row-gap:6px;
  padding:12px 0 10px;border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:10px;}
.brand img{height:30px;width:auto;filter:drop-shadow(0 0 8px rgba(59,130,246,0.35));opacity:.95;}
.brand-title{font-size:18px;font-weight:900;text-transform:uppercase;letter-spacing:3px;color:#fff;line-height:1;}
.brand-sub{font-size:10px;color:#5a7aa0;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
#playerCountBadge{
  margin-left:auto;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--blue);background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);
  border-radius:6px;padding:4px 10px;white-space:nowrap;
}

/* ── CONTROLS ── */
.controls{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;row-gap:6px;
  padding:8px 0 6px;
}
.pos-switcher{
  display:flex;gap:3px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:10px;padding:3px;flex-shrink:0;
}
.pos-btn{
  background:none;border:1px solid transparent;cursor:pointer;
  font-family:'Roboto Condensed',sans-serif;
  font-weight:900;font-size:14px;letter-spacing:2px;text-transform:uppercase;
  padding:7px 18px;border-radius:7px;transition:all .18s;
  color:#7a9dc0;white-space:nowrap;
}
.pos-btn:hover{color:#c8ddf0;background:rgba(255,255,255,.04);}
.pos-btn.active-QB{background:rgba(59,130,246,.2);color:#60a5fa;border-color:rgba(59,130,246,.4);}
.pos-btn.active-RB{background:rgba(34,197,94,.2);color:#4ade80;border-color:rgba(34,197,94,.4);}
.pos-btn.active-WR{background:rgba(245,158,11,.2);color:#fbbf24;border-color:rgba(245,158,11,.4);}
.pos-btn.active-TE{background:rgba(168,85,247,.2);color:#c084fc;border-color:rgba(168,85,247,.4);}

.search-wrap{position:relative;width:220px;flex-shrink:0;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#7a9dc0;font-size:13px;pointer-events:none;}
#searchBox{
  width:100%;background:rgba(13,21,38,.9);
  border:1.5px solid var(--border2);color:#c8ddf0;
  font-family:'Roboto Condensed',sans-serif;font-size:14px;font-weight:600;
  padding:9px 12px 9px 32px;border-radius:8px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
#searchBox:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow);}
#searchBox::placeholder{color:#4e6a88;}

.cat-wrap{
  display:flex;gap:3px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:10px;padding:3px;flex-shrink:1;min-width:0;
}
.cat-wrap::-webkit-scrollbar{display:none;}
.cat-btn{
  background:none;border:none;cursor:pointer;
  font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:12px;
  letter-spacing:1.2px;text-transform:uppercase;padding:7px 14px;
  border-radius:6px;transition:all .18s;color:#7a9dc0;white-space:nowrap;flex-shrink:0;
}
.cat-btn:hover{background:var(--blue-glow);color:#c8ddf0;}
.cat-btn.active{background:var(--blue);color:#fff;}

.row-count{
  font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--text-dim);white-space:nowrap;margin-left:auto;flex-shrink:0;
}

/* ── DICTIONARY BAR ── */
.dict-bar{
  background:rgba(10,17,32,.7);border:1px solid var(--border);border-radius:8px;
  padding:6px 14px;overflow-x:auto;scrollbar-width:none;margin-bottom:4px;
}
.dict-bar::-webkit-scrollbar{display:none;}
.dict-inner{display:flex;align-items:center;flex-wrap:wrap;row-gap:4px;}
.dict-entry{
  display:flex;align-items:baseline;gap:5px;
  padding:2px 12px 2px 0;margin-right:12px;
  border-right:1px solid rgba(42,64,112,.6);
}
.dict-entry:last-child{border-right:none;margin-right:0;}
.dict-abbr{font-size:12px;font-weight:900;letter-spacing:1.2px;text-transform:uppercase;color:var(--blue);}
.dict-desc{font-size:11px;color:#6a88aa;font-weight:500;}

/* ── SCROLL HINT ── */
.scroll-hint{
  display:none;align-items:center;justify-content:center;gap:6px;
  font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:#4e7aa0;padding:4px 0 3px;
}

/* ── TABLE AREA ── */
.table-area{
  /* contains the horizontally-scrolling table — never bleeds outside */
  width:100%;
  overflow:hidden;              /* clip, not scroll — scroll is on .table-scroll */
  border:1.5px solid var(--border);border-radius:12px;
  background:var(--surface);margin-bottom:14px;position:relative;
  height:1420px;                /* ~30 rows desktop */
}
.table-scroll{
  width:100%;height:100%;
  overflow-x:auto;              /* horizontal: always scrollable */
  overflow-y:auto;              /* vertical: scrollable when rows > height */
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;  /* prevent page scroll bleed */
}
.table-scroll::-webkit-scrollbar{width:5px;height:5px;}
.table-scroll::-webkit-scrollbar-track{background:transparent;}
.table-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px;}

/* ── TABLE ── */
table{
  border-collapse:collapse;
  font-family:'Roboto Condensed',sans-serif;
  /* don't stretch: let min-widths drive the width so horizontal scroll works */
  width:max-content;min-width:100%;
}

/* ── THEAD ── */
thead th{
  position:sticky;top:0;z-index:20;
  background:var(--header-bg);border-bottom:1px solid rgba(42,64,112,.7);
  white-space:nowrap;padding:0;user-select:none;
}
thead tr:nth-child(2) th{
  /* top is set dynamically by JS after render — see fixSecondHeaderTop() */
  top:44px;z-index:19;background:#091428;border-bottom:1px solid rgba(42,64,112,.7);
}
.th-btn{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:11px 14px;width:100%;
  background:none;border:none;cursor:pointer;
  font-family:'Roboto Condensed',sans-serif;
  font-size:13px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
  color:#fff;white-space:nowrap;transition:background .15s;
}
.th-btn:hover{background:rgba(255,255,255,.05);}
th.is-sorted .th-btn{color:var(--blue);}
.sort-icon{opacity:.35;font-size:9px;transition:opacity .15s;}
th.is-sorted .sort-icon{opacity:1;color:var(--blue);}
.grp-hd{text-align:center;padding:7px 14px !important;font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}

/* ── FROZEN COLUMNS — rank + player ── */
/* col 1: rank */
th:nth-child(1),td:nth-child(1){
  position:sticky;left:0;z-index:12;
  width:var(--w-rank);min-width:var(--w-rank);max-width:var(--w-rank);
  background:#0d1526;
}
/* col 2: player */
th:nth-child(2),td:nth-child(2){
  position:sticky;left:var(--w-rank);z-index:12;
  width:var(--w-player);min-width:var(--w-player);
  background:#0d1526;
  /* hard shadow separator — covers scrolling content behind it */
  box-shadow:4px 0 8px 2px #060a14;
}
/* header frozen cols — higher z so they sit above body frozen cols */
thead th:nth-child(1),thead th:nth-child(2){
  background:#0e1e4a;z-index:28;
  box-shadow:none; /* header gets border not shadow */
}
thead th:nth-child(2){
  border-right:1px solid rgba(42,64,112,.6);
  box-shadow:4px 0 8px 2px #060a14;
}
thead tr:nth-child(2) th:nth-child(1),
thead tr:nth-child(2) th:nth-child(2){background:#091428;z-index:28;}
thead tr:nth-child(2) th:nth-child(2){box-shadow:4px 0 8px 2px #060a14;}

/* Frozen col body backgrounds — fully opaque, all states */
tbody tr:nth-child(even) td:nth-child(1),
tbody tr:nth-child(even) td:nth-child(2){background:#08101e !important;}
tbody tr:nth-child(odd)  td:nth-child(1),
tbody tr:nth-child(odd)  td:nth-child(2){background:#0d1526 !important;}
tbody tr:hover td:nth-child(1),
tbody tr:hover td:nth-child(2){background:#0f2040 !important;}

/* route-depth group start divider */
th.grp-start{border-left:2px solid var(--border2);}
td.grp-start{border-left:2px solid rgba(42,64,112,.4);}

/* ── ROWS ── */
tbody tr{
  border-bottom:1px solid rgba(30,48,88,.35);
  transition:background .1s;
  animation:rowIn .2s ease both;
}
@keyframes rowIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
tbody tr:hover td{background:rgba(59,130,246,.06) !important;}
tbody tr:nth-child(even) td{background:rgba(255,255,255,.011);}

td{padding:10px 14px;font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;vertical-align:middle;}
td.is-sorted-col{background:rgba(59,130,246,.04);}

/* rank cell */
td:nth-child(1){
  text-align:center;padding:10px 0;
  font-weight:900;font-size:14px;color:var(--text-muted);
}
tbody tr:nth-child(1) td:nth-child(1){color:var(--gold);}
tbody tr:nth-child(2) td:nth-child(1){color:#9ca3af;}
tbody tr:nth-child(3) td:nth-child(1){color:#b45309;}

/* player cell */
td:nth-child(2){padding:10px 12px;}
.pcell{display:flex;align-items:baseline;gap:7px;}
.pname{font-size:15px;font-weight:800;color:#fff;white-space:nowrap;}
.pteam{font-size:11px;color:#6a88aa;font-weight:700;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;}

/* stat cells */
td.stat{
  text-align:center;font-weight:700;font-size:15px;
  font-variant-numeric:tabular-nums;min-width:72px;color:#e2e8f0;
}
td.stat.is-sorted-col{color:#fff;}

/* ── STATES ── */
.loading-state,.empty-state{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--text-muted);font-weight:700;font-size:13px;
  letter-spacing:2px;text-transform:uppercase;gap:12px;
}
.spinner{
  width:30px;height:30px;border:3px solid var(--border);
  border-top-color:var(--blue);border-radius:50%;
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{display:none;}

/* ════════════════════════════════════════════
   MOBILE  ≤ 680px
   ════════════════════════════════════════════ */
@media(max-width:680px){
  :root{
    --w-rank:26px;
    --w-player:115px;
  }

  /* minimal outer padding — embedded context */
  .page{padding:0 4px 20px;}

  /* ── top bar ── */
  .topbar{padding:8px 0 7px;gap:8px;}
  .brand img{height:20px;}
  .brand-title{font-size:13px;letter-spacing:1.5px;}
  .brand-sub{font-size:8px;letter-spacing:1px;}
  #playerCountBadge{font-size:10px;padding:3px 8px;letter-spacing:.5px;}

  /* ── controls: 3 clean stacked rows
     Row 1: pos switcher
     Row 2: category tabs (full width, horizontally scrollable)
     Row 3: search (full width)                               */
  .controls{
    flex-direction:column;
    align-items:stretch;
    gap:5px;
    padding:6px 0 4px;
  }
  .pos-switcher{align-self:flex-start;}
  .pos-btn{font-size:11px;padding:6px 12px;letter-spacing:1px;border-radius:6px;}
  .cat-wrap{width:100%;flex-shrink:0;}
  .cat-btn{font-size:10px;padding:6px 10px;letter-spacing:.8px;}
  .search-wrap{width:100%;}
  #searchBox{width:100%;font-size:16px;padding:8px 12px 8px 30px;}
  .row-count{display:none;}

  /* ── dictionary ── */
  .dict-bar{padding:4px 8px;margin-bottom:3px;}
  .dict-inner{flex-wrap:wrap;row-gap:2px;}
  .dict-entry{padding:1px 6px 1px 0;margin-right:6px;}
  .dict-abbr{font-size:10px;letter-spacing:.8px;}
  .dict-desc{font-size:9px;}

  /* scroll hint */
  .scroll-hint{display:flex;}

  /* ── table area ── */
  .table-area{height:68vh;min-height:340px;border-radius:8px;}

  /* ── header buttons ── */
  .th-btn{font-size:10px;font-weight:900;padding:7px 5px;letter-spacing:.6px;gap:2px;}
  .sort-icon{font-size:7px;}
  .grp-hd{padding:5px 6px !important;font-size:9px;letter-spacing:1px;}

  /* ── body cells ── */
  td{padding:8px 5px;font-size:12px;font-weight:600;}
  td:nth-child(1){padding:8px 0;font-size:11px;}
  td:nth-child(2){padding:8px 6px;}
  .pcell{flex-direction:column;align-items:flex-start;gap:0;}
  .pname{font-size:12px;font-weight:800;line-height:1.2;}
  .pteam{font-size:9px;letter-spacing:.5px;}
  td.stat{font-size:12px;min-width:44px;padding:8px 3px;text-align:center;}
}

/* ── very small phones ≤ 360px ── */
@media(max-width:360px){
  :root{--w-rank:22px;--w-player:98px;}
  .page{padding:0 2px 16px;}
  .pos-btn{font-size:10px;padding:5px 9px;}
  .cat-btn{font-size:9px;padding:5px 7px;}
  td{padding:7px 4px;font-size:11px;}
  td.stat{font-size:11px;min-width:38px;padding:7px 2px;}
  .pname{font-size:11px;}
  .th-btn{font-size:9px;padding:6px 4px;}
}
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <div class="brand">
      <img src="https://xep.ai/wp-content/uploads/2024/07/Logo-PNG-2-1.png" alt="xEP" onerror="this.style.display='none'">
      <div>
        <div class="brand-title">Stats Explorer</div>
        <div class="brand-sub">2025-26 Season &nbsp;·&nbsp; Data: xEP Network</div>
      </div>
    </div>
    <span id="playerCountBadge">Loading...</span>
  </div>

  <div class="controls">
    <div class="pos-switcher" id="posSwitcher">
      <button class="pos-btn" data-pos="QB">QB</button>
      <button class="pos-btn" data-pos="RB">RB</button>
      <button class="pos-btn" data-pos="WR">WR</button>
      <button class="pos-btn" data-pos="TE">TE</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">&#9906;</span>
      <input id="searchBox" type="text" placeholder="Search player..." autocomplete="off">
    </div>
    <div class="cat-wrap" id="catWrap"></div>
    <div class="row-count" id="rowCount"></div>
  </div>

  <div class="dict-bar" id="dictBar">
    <div class="dict-inner" id="dictInner"></div>
  </div>

  <div class="scroll-hint" id="scrollHint">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    Swipe to explore stats
  </div>

  <div class="table-area" id="tableArea">
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div><span>Loading Player Data...</span>
    </div>
    <div class="empty-state" id="emptyState">No players match your search.</div>
    <div class="table-scroll" id="tableScroll" style="display:none">
      <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
  </div>

</div>
<script>
const PROXIES=[
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];
const SHEETS={
  QB:'https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1152850061&single=true&output=csv',
  RB:'https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1056171373&single=true&output=csv',
  REC:'https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1048851676&single=true&output=csv',
};

async function fetchWithFallback(url){
  // Race all proxies simultaneously — first good response wins
  const tryProxy = p => new Promise(async(resolve,reject)=>{
    try{
      const ctrl=new AbortController();
      const t=setTimeout(()=>ctrl.abort(),6000); // 6s hard timeout
      const r=await fetch(p(url),{signal:ctrl.signal});
      clearTimeout(t);
      if(!r.ok)throw new Error('HTTP '+r.status);
      const txt=await r.text();
      if(!txt||txt.trim().length<50)throw new Error('empty');
      resolve(txt);
    }catch(e){reject(e);}
  });
  // Try all proxies in parallel; return first success
  return Promise.any(PROXIES.map(p=>tryProxy(p)));
}

function parseCSV(txt){
  // Fast split on \r\n or \n
  const lines=txt.trim().split(/\r?\n/);
  const rawHeaders=lines[0].split(',');
  const headers=rawHeaders.map(h=>h.trim().replace(/"/g,''));
  const hLen=headers.length;
  const out=[];
  for(let i=1;i<lines.length;i++){
    const vals=csvSplit(lines[i]);
    if(!vals[0]&&!vals[1])continue; // skip blank rows fast
    const obj={};
    for(let j=0;j<hLen;j++) obj[headers[j]]=(vals[j]||'').trim();
    if(obj['display_name']) out.push(obj);
  }
  return out;
}
function csvSplit(line){
  const r=[];let q=false,c='';
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){q=!q;}
    else if(ch===','&&!q){r.push(c);c='';}
    else c+=ch;
  }
  r.push(c);return r;
}

// ── SESSION CACHE ────────────────────────────────────────
// Store fetched data in sessionStorage so refreshing the tab is instant
const CACHE_KEY='xep_nfl_v2';
function saveCache(qb,rb,rec){
  try{sessionStorage.setItem(CACHE_KEY,JSON.stringify({t:Date.now(),qb,rb,rec}));}catch(e){}
}
function loadCache(){
  try{
    const raw=sessionStorage.getItem(CACHE_KEY);
    if(!raw)return null;
    const d=JSON.parse(raw);
    // Cache valid for 10 minutes
    if(Date.now()-d.t>600000){sessionStorage.removeItem(CACHE_KEY);return null;}
    return d;
  }catch(e){return null;}
}

/* ─────────────────────────────────────────────────────────
   COLUMN DEFINITIONS
   Each col: {k: dataKey, lab: header label, fmt, desc}
   Route-Depth tabs have depth:true and cols get grp+grpColor
───────────────────────────────────────────────────────── */
const DEFS={
  QB:[
    {cat:'Overview',cols:[
      {k:'CMP',           lab:'CMP',     fmt:'int',   desc:'Completions'},
      {k:'ATT',           lab:'ATT',     fmt:'int',   desc:'Pass Attempts'},
      {k:'CMP%',          lab:'CMP%',    fmt:'pct',   desc:'Completion Percentage'},
      {k:'YDS',           lab:'YDS',     fmt:'int',   desc:'Passing Yards'},
      {k:'TD',            lab:'TD',      fmt:'int',   desc:'Passing Touchdowns'},
      {k:'INT',           lab:'INT',     fmt:'int',   desc:'Interceptions'},
      {k:'passer_rating', lab:'RTG',     fmt:'dec1',  desc:'NFL Passer Rating'},
      {k:'SuccessPct',    lab:'SUCC%',   fmt:'pct',   desc:'Success Rate (EPA > 0 per play)'},
      {k:'EPA',           lab:'EPA',     fmt:'dec2',  desc:'Expected Points Added'},
      {k:'CPOE',          lab:'CPOE',    fmt:'cpoe',  desc:'Completion % Over Expected'},
      {k:'IAY',           lab:'ADOT',    fmt:'dec2',  desc:'Avg Depth of Target'},
      {k:'YAC',           lab:'YAC',     fmt:'dec1',  desc:'Yards After Catch'},
    ]},
    {cat:'Accuracy',cols:[
      {k:'on_tgt_pct',    lab:'ON TGT%', fmt:'pct',   desc:'On-Target Throw Rate'},
      {k:'on_tgt_throws', lab:'ON TGT',  fmt:'int',   desc:'Total On-Target Throws'},
      {k:'bad_throws',    lab:'BAD',     fmt:'int',   desc:'Bad Throws'},

/* ── LOAD ── */
async function loadAll(isRetry=false){
  // ── 1. Try cache first (instant) ──
  const cached=loadCache();
  if(cached){
    applyData(cached.qb,cached.rb,cached.rec);
    // Silently refresh cache in background
    refreshInBackground();
    return;
  }

  // ── 2. No cache: fetch QB first, show it immediately ──
  try{
    // Kick off all 3 fetches in parallel right away
    const qbPromise  = fetchWithFallback(SHEETS.QB).then(parseCSV);
    const rbPromise  = fetchWithFallback(SHEETS.RB).then(parseCSV);
    const recPromise = fetchWithFallback(SHEETS.REC).then(parseCSV);

    // Show QB data the moment it arrives
    const qbR = await qbPromise;
    data.QB = qbR;
    document.getElementById('loadingState').style.display='none';
    document.getElementById('tableScroll').style.display='block';
    state.sortKey=DEFS['QB'][0].cols[0].k;
    render();
    // Update badge optimistically
    document.getElementById('playerCountBadge').textContent=qbR.length+' QBs loaded…';

    // Wait for remaining two
    const [rbR, recR] = await Promise.all([rbPromise, recPromise]);
    applyData(qbR, rbR, recR);
    saveCache(qbR, rbR, recR);

  }catch(e){
    if(!isRetry){
      document.getElementById('loadingState').innerHTML='<div class="spinner"></div><span>Retrying...</span>';
      setTimeout(()=>loadAll(true),2000);
    }else{
      document.getElementById('loadingState').innerHTML=
        '<span style="color:#ef4444">Failed to load data.</span><button onclick="location.reload()" style="margin-top:8px;background:var(--blue);border:none;color:#fff;font-family:inherit;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:8px 20px;border-radius:7px;cursor:pointer">Reload</button>';
    }
  }
}

function applyData(qbR, rbR, recR){
  data.QB=qbR; data.RB=rbR; data.WR=[]; data.TE=[];
  recR.forEach(r=>{
    const p=(r['player_position']||'WR').trim().toUpperCase();
    if(p==='TE')data.TE.push(r);else data.WR.push(r);
  });
  const tot=data.QB.length+data.RB.length+data.WR.length+data.TE.length;
  document.getElementById('playerCountBadge').textContent=tot+' Players';
  document.getElementById('loadingState').style.display='none';
  document.getElementById('tableScroll').style.display='block';
  if(!state.sortKey) state.sortKey=DEFS[state.pos][0].cols[0].k;
  render();
}

async function refreshInBackground(){
  try{
    const [qbR,rbR,recR]=await Promise.all([
      fetchWithFallback(SHEETS.QB).then(parseCSV),
      fetchWithFallback(SHEETS.RB).then(parseCSV),
      fetchWithFallback(SHEETS.REC).then(parseCSV),
    ]);
    saveCache(qbR,rbR,recR);
  }catch(e){/* silent */}
}

/* ── FORMAT ── */
// Fast integer comma formatter — avoids slow toLocaleString
function addCommas(n){
  const s=Math.round(n).toString();
  return s.length>3?s.replace(/\B(?=(\d{3})+(?!\d))/g,','):s;
}
function fmtVal(raw,fmt){
  if(raw===''||raw===undefined||raw===null)return'—';
  const n=+raw;
  if(isNaN(n))return'—';
  switch(fmt){
    case'int':  return addCommas(n);
    case'dec1': return n.toFixed(1);
    case'dec2': return n.toFixed(2);
    case'dec2s':return n.toFixed(2)+'s';
    case'pct':  return(Math.abs(n)<=1.5?n*100:n).toFixed(1)+'%';
    case'cpoe': return n.toFixed(2)+'%';
    default:    return n.toFixed(1);
  }
}
function numVal(raw){const n=+raw;return isNaN(n)?-Infinity:n;}

/* ── CACHED DOM REFS ── */
const $catWrap   = document.getElementById('catWrap');
const $dictInner = document.getElementById('dictInner');
const $rowCount  = document.getElementById('rowCount');
const $emptyState= document.getElementById('emptyState');
const $thead     = document.getElementById('thead');
const $tbody     = document.getElementById('tbody');

/* ── RENDER ── */
function render(){
  const{pos,cat,sortKey,sortDir,search}=state;
  const cats=DEFS[pos];
  const catDef=cats[cat];
  const cols=catDef.cols;
  const nCols=cols.length;
  const isDepth=!!catDef.depth;
  const sk=sortKey||cols[0].k;

  /* Category buttons */
  const cbParts=[];
  for(let i=0;i<cats.length;i++)
    cbParts.push(`<button class="cat-btn${i===cat?' active':''}" onclick="setCat(${i})">${cats[i].cat}</button>`);
  $catWrap.innerHTML=cbParts.join('');

  /* Dictionary */
  if(isDepth){
    const seen={},dp=[];
    for(let i=0;i<nCols;i++){const c=cols[i];if(!seen[c.lab]){seen[c.lab]=1;dp.push(`<div class="dict-entry"><span class="dict-abbr">${c.lab}</span><span class="dict-desc">${depthDesc(c.lab)}</span></div>`);}}
    $dictInner.innerHTML=dp.join('');
  }else{
    const dp=[];
    for(let i=0;i<nCols;i++){const c=cols[i];dp.push(`<div class="dict-entry"><span class="dict-abbr">${c.lab}</span><span class="dict-desc">${c.desc||''}</span></div>`);}
    $dictInner.innerHTML=dp.join('');
  }

  /* Filter */
  const q=search.trim().toLowerCase();
  const src=data[pos];
  let rows=q?src.filter(r=>(r['display_name']||'').toLowerCase().includes(q)):src;

  /* Sort — pre-extract numeric vals for speed */
  const sorted=[...rows];
  const dir=sortDir==='desc'?-1:1;
  sorted.sort((a,b)=>(numVal(a[sk])-numVal(b[sk]))*dir);
  rows=sorted;

  $rowCount.textContent=rows.length+' player'+(rows.length!==1?'s':'');
  $emptyState.style.display=rows.length?'none':'flex';
  if(!rows.length){$tbody.innerHTML='';return;}

  /* ── THEAD ── */
  if(isDepth){
    const groups=[];
    for(let i=0;i<nCols;i++){
      const c=cols[i];
      let g=groups.find(x=>x.name===c.grp);
      if(!g){g={name:c.grp,color:c.grpColor||'#3b82f6',count:0};groups.push(g);}
      g.count++;
    }
    const sp=[];
    for(let gi=0;gi<groups.length;gi++){
      const g=groups[gi];
      sp.push(`<th colspan="${g.count}" class="grp-hd${gi?'  grp-start':''}" style="color:${g.color};border-bottom:2px solid ${g.color}22;">${g.name}</th>`);
    }
    const cr=[];
    for(let ci=0;ci<nCols;ci++){
      const c=cols[ci];
      const sorted2=c.k===sk;
      const arr=sorted2?(sortDir==='desc'?'↓':'↑'):'↕';
      const first=ci===0||cols[ci-1].grp!==c.grp;
      cr.push(`<th class="${sorted2?'is-sorted':''}${first?' grp-start':''}" onclick="setSort('${c.k}')"><button class="th-btn">${c.lab} <span class="sort-icon">${arr}</span></button></th>`);
    }
    $thead.innerHTML=`<tr><th rowspan="2"><button class="th-btn" style="justify-content:center;height:100%">#</button></th><th rowspan="2"><button class="th-btn" style="height:100%">Player</button></th>${sp.join('')}</tr><tr>${cr.join('')}</tr>`;
  }else{
    const th=[];
    for(let i=0;i<nCols;i++){
      const c=cols[i];
      const isSorted=c.k===sk;
      const arr=isSorted?(sortDir==='desc'?'↓':'↑'):'↕';
      th.push(`<th class="${isSorted?'is-sorted':''}" onclick="setSort('${c.k}')"><button class="th-btn">${c.lab} <span class="sort-icon">${arr}</span></button></th>`);
    }
    $thead.innerHTML=`<tr><th><button class="th-btn" style="justify-content:center">#</button></th><th><button class="th-btn">Player</button></th>${th.join('')}</tr>`;
  }

  /* ── TBODY — build one big string with array push ── */
  const nRows=rows.length;
  const parts=[];
  // Pre-compute sorted column index set for fast lookup
  const skIdx=new Set();for(let i=0;i<nCols;i++){if(cols[i].k===sk)skIdx.add(i);}

  for(let idx=0;idx<nRows;idx++){
    const row=rows[idx];
    const name=row['display_name']||'—';
    const team=(row['posteam']||row['team_abbr']||'').toUpperCase();
    // Only animate first 30 rows — large lists skip animation
    const delay=idx<30?` style="animation-delay:${(idx*.01).toFixed(2)}s"`:'';
    parts.push(`<tr${delay}><td>${idx+1}</td><td><div class="pcell"><span class="pname">${name}</span><span class="pteam">${team}</span></div></td>`);
    for(let ci=0;ci<nCols;ci++){
      const c=cols[ci];
      const val=fmtVal(row[c.k],c.fmt);
      const cls=(skIdx.has(ci)?' is-sorted-col':'')+(isDepth&&(ci===0||cols[ci-1].grp!==c.grp)?' grp-start':'');
      parts.push(`<td class="stat${cls}">${val}</td>`);
    }
    parts.push('</tr>');
  }
  $tbody.innerHTML=parts.join('');

  // Fix second header row top offset (route depth has 2 header rows)
  // Use rAF so the browser has painted the first row before we measure it
  requestAnimationFrame(fixSecondHeaderTop);
}

function depthDesc(lab){
  const map={TGT:'Targets',REC:'Receptions',YDS:'Yards',EPA:'Expected Points Added','CMP%':'Completion %',ATT:'Attempts'};
  return map[lab]||lab;
}

/* ── FIX SECOND HEADER ROW TOP ──────────────────────────────
   Route-depth tabs have 2 thead rows. The second row must sit
   exactly below the first. We measure the first row's actual
   rendered height and set top dynamically — this works on both
   desktop and mobile where the header height differs.
──────────────────────────────────────────────────────────── */
function fixSecondHeaderTop(){
  const firstRow = document.querySelector('#thead tr:nth-child(1)');
  const secondRow = document.querySelector('#thead tr:nth-child(2)');
  if(!firstRow || !secondRow) return;
  const h = firstRow.getBoundingClientRect().height;
  // Apply to every th in the second row
  secondRow.querySelectorAll('th').forEach(th=>{
    th.style.top = Math.ceil(h) + 'px';
  });
}

function setPos(pos){
  state.pos=pos;state.cat=0;state.search='';
  state.sortKey=DEFS[pos][0].cols[0].k;state.sortDir='desc';
  document.getElementById('searchBox').value='';
  document.querySelectorAll('.pos-btn').forEach(b=>{
    b.className='pos-btn'+(b.dataset.pos===pos?' active-'+pos:'');
  });
  render();
}
function setCat(i){
  state.cat=i;
  state.sortKey=DEFS[state.pos][i].cols[0].k;
  state.sortDir='desc';
  render();
}
function setSort(key){
  if(state.sortKey===key)state.sortDir=state.sortDir==='desc'?'asc':'desc';
  else{state.sortKey=key;state.sortDir='desc';}
  render();
}

// Re-fix second header top on resize (orientation change etc)
window.addEventListener('resize',()=>requestAnimationFrame(fixSecondHeaderTop));

/* ── Mobile scroll hint ── */
(function(){
  const scroller = document.getElementById('tableScroll');
  const area = document.getElementById('tableArea');
  const hint = document.getElementById('scrollHint');
  let hinted = false;
  scroller.addEventListener('scroll', function onScroll(){
    if(!hinted && scroller.scrollLeft > 10){
      hinted = true;
      area.classList.add('scrolled-x');
      hint.style.opacity = '0';
      hint.style.transition = 'opacity .4s';
      setTimeout(()=>{ hint.style.display='none'; }, 450);
      scroller.removeEventListener('scroll', onScroll);
    }
  }, {passive:true});
})();

setPos('QB');
loadAll();
</script>
