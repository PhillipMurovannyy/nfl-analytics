<!-- External Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- WR Dashboard -->
<div id="wr-dashboard" style="font-family:Roboto,sans-serif;background:#0e1117;color:#ffffff;border:2px solid #2d323b;border-radius:8px;padding:18px;max-width:750px;margin:auto;">

  <!-- Dropdown Selector -->
  <div style="text-align:center;margin-bottom:24px;">
    <label for="playerSelectWR" style="display:block;color:#fff;margin-bottom:8px;font-size:16px;font-weight:500;">
      Select Player:
    </label>
    <div style="display:flex;justify-content:center;">
      <select id="playerSelectWR" style="padding:10px;width:70%;border:1px solid #2d323b;border-radius:5px;background:#1a1f27;color:#ffffff;font-size:17px;text-align:center;">
        <option>Loading players...</option>
      </select>
    </div>
  </div>

  <!-- Chart Area -->
  <div id="chart-area-wr">
    <div style="text-align:center;margin-bottom:10px;">
      <h4 style="color:#ffffff;font-weight:400;font-size:14px;margin:0;">
        Receiving Metrics & League Percentiles | Data: xEP Network
      </h4>
      <p style="color:#cccccc;font-size:13px;max-width:600px;margin:3px auto 0;">
        <strong>League PCTL</strong> = percentile rank vs all qualifying WRs — higher is better.
      </p>
    </div>

    <!-- Title -->
    <h2 id="player-titleWR" style="background:linear-gradient(90deg,#40916c 0%,#1b4332 100%);color:#ffffff;height:56px;padding:0 14px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;border-radius:6px;font-weight:700;font-size:22px;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px;text-align:center;">
      <div></div>
      <span id="player-title-textWR">Receiving Season Analytics</span>
      <img src="https://xepanalytics.com/wp-content/uploads/2024/12/Logo-PNG-2.png" alt="XEP Logo" style="max-height:60px;transform:scale(1.3);width:auto;justify-self:end;filter:brightness(1.3);margin-left:10px;">
    </h2>

    <!-- Table -->
    <table id="playerTableWR" style="width:100%;border-collapse:collapse;text-align:center;color:white;table-layout:fixed;font-size:17px;line-height:1;">
      <thead>
        <tr style="background:#1a1f27;color:#ffffff;font-weight:600;">
          <th style="padding:6px 0;">METRIC</th>
          <th style="padding:6px 0;">VALUE</th>
          <th style="padding:6px 0;">LEAGUE PCTL</th>
        </tr>
      </thead>
      <tbody id="playerBodyWR"></tbody>
    </table>
  </div>

  <!-- Copy Button -->
  <div style="text-align:center;margin-top:15px;">
    <button onclick="copyWRChartImage()" style="padding:10px 20px;background:#2e7d32;color:white;font-size:15px;border:none;border-radius:5px;cursor:pointer;font-weight:bold;">📸 Copy Chart Image</button>
    <p id="copyConfirmWR" style="color:#7af07a;font-size:13px;margin-top:8px;display:none;">✅ Chart image copied to clipboard!</p>
  </div>
</div>

<!-- Responsive Mobile Styling -->
<style>
@media (max-width:768px){
  #wr-dashboard{
    padding:10px 8px !important;
    max-width:100% !important;
    border-width:1px !important;
    border-radius:6px !important;
  }
  #playerSelectWR{
    width:95% !important;
    font-size:15px !important;
    padding:9px !important;
  }
  #player-titleWR{
    grid-template-columns:1fr auto !important;
    height:auto !important;
    padding:10px 12px !important;
    font-size:18px !important;
    gap:8px;
  }
  #player-titleWR > div:first-child{
    display:none !important;
  }
  #player-title-textWR{
    font-size:15px !important;
    line-height:1.2;
    text-align:left;
  }
  #player-titleWR img{
    max-height:40px !important;
    transform:scale(1.1) !important;
    margin-left:6px !important;
  }
  #chart-area-wr h4{
    font-size:12px !important;
  }
  #chart-area-wr p{
    font-size:11px !important;
  }
  #playerTableWR{
    font-size:13px !important;
    line-height:1.15 !important;
  }
  #playerTableWR th{
    padding:5px 3px !important;
    font-size:11px !important;
  }
  #playerTableWR td{
    padding:5px 4px !important;
    font-size:13px !important;
  }
  #playerTableWR td:first-child{
    font-size:12px !important;
    padding-left:6px !important;
  }
  #wr-dashboard button[onclick*="copyWRChartImage"]{
    font-size:13px !important;
    padding:8px 16px !important;
  }
}

@media (max-width:400px){
  #player-title-textWR{
    font-size:13px !important;
  }
  #player-titleWR img{
    max-height:34px !important;
  }
  #playerTableWR{
    font-size:12px !important;
  }
  #playerTableWR td:first-child{
    font-size:11px !important;
  }
}
</style>

<!-- Main Script -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  const wrCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=104743812&single=true&output=csv';
  const select = document.getElementById("playerSelectWR");
  const tbody = document.getElementById("playerBodyWR");

  function getColor(p){
    const percNum=parseFloat(p);
    return percNum>=80?"#2e7d32":percNum>=60?"#38b000":percNum>=40?"#f9a825":percNum>=20?"#e65100":"#b71c1c";
  }

  function formatValue(stat,val){
    if(!val)return"-";
    const num=parseFloat(val);
    if(isNaN(num))return val;
    if(["TGT","REC","TD","YDS","Short_YDS","Intermediate_YDS","Deep_YDS"].includes(stat))return Math.round(num);
    if(["avg_yac","avg_separation","ADOT"].includes(stat))return num.toFixed(1);
    if(["avg_yac_above_expectation"].includes(stat))return num.toFixed(2);
    if(["CPOE"].includes(stat))return num.toFixed(1)+"%";
    return num.toFixed(1);
  }

  Papa.parse(wrCSV,{
    download:true,
    header:true,
    complete:function(results){
      const rows=results.data;
      if(!rows||!rows.length){select.innerHTML="<option>No data found</option>";return;}

      const firstRow=rows[0];
      const nameKey=Object.keys(firstRow).find(k=>k.toLowerCase().includes("display_name")||k.toLowerCase().includes("player_name")||k.toLowerCase().includes("name"));
      if(!nameKey){select.innerHTML="<option>⚠️ Player column not found</option>";return;}

      const data=rows.filter(r=>r[nameKey]&&r[nameKey].trim()!=="");
      if(!data.length){select.innerHTML="<option>No players found</option>";return;}

      const names=[...new Set(data.map(r=>r[nameKey]))].sort((a,b)=>a.localeCompare(b));
      select.innerHTML=names.map(n=>`<option value="${n}">${n}</option>`).join("");

      function loadWR(name){
        const player=data.find(r=>r[nameKey].trim().toLowerCase()===name.trim().toLowerCase());
        tbody.innerHTML="";
        if(!player)return;

        document.getElementById("player-title-textWR").textContent=player[nameKey]+" Season Analytics";

        const mapping=[
          ["TGT","TGT_PERC","Targets"],
          ["REC","REC_PERC","Receptions"],
          ["YDS","YDS_PERC","Receiving Yards"],
          ["TD","TD_PERC","Touchdowns"],
          ["avg_yac","avg_yac_PERC","Avg Yards After Catch"],
          ["avg_yac_above_expectation","avg_yac_above_expectation_PERC","YAC Over Expected"],
          ["ADOT","ADOT_PERC","ADOT"],
          ["CPOE","CPOE_PERC","Catch % Over Expected"],
          ["avg_separation","avg_separation_PERC","Avg Separation"],
          ["Short_YDS","Short_YDS_PERC","Short Route Yards"],
          ["Intermediate_YDS","Intermediate_YDS_PERC","Intermediate Route Yards"],
          ["Deep_YDS","Deep_YDS_PERC","Deep Route Yards"]
        ];

        mapping.forEach(([stat,perc,label])=>{
          const val=formatValue(stat,player[stat]);
          const p=parseFloat(player[perc])||0;
          const color=getColor(p);
          tbody.insertAdjacentHTML("beforeend",
            `<tr style="background:#111827;">
              <td style="border-bottom:1px solid #2d323b;text-align:left;padding:3px 6px;">${label}</td>
              <td style="border-bottom:1px solid #2d323b;padding:3px 6px;">${val}</td>
              <td style="border-bottom:1px solid #2d323b;padding:3px 6px;background:${color};color:white;font-weight:bold;">${Math.round(p)}%</td>
            </tr>`
          );
        });
      }

      select.addEventListener("change",e=>loadWR(e.target.value));
      loadWR(names[0]);
    },
    error:function(err){
      console.error("PapaParse failed:",err);
      select.innerHTML="<option>Failed to load data</option>";
    }
  });

  window.copyWRChartImage=async function(){
    const chart=document.getElementById("chart-area-wr");
    try{
      const canvas=await html2canvas(chart,{backgroundColor:"#0e1117",scale:2,useCORS:true});
      const blob=await new Promise(resolve=>canvas.toBlob(resolve,"image/png"));
      await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);
      const confirm=document.getElementById("copyConfirmWR");
      confirm.style.display="block";
      setTimeout(()=>confirm.style.display="none",2500);
    }catch{
      alert("❌ Copy failed — your browser may not support image clipboard access.");
    }
  };
});
</script>
