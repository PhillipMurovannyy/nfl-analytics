<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFL Player Analytics | 2025 Season</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── Reset scoped to our wrapper only ── */
#nfl-player-wrap, #nfl-player-wrap *, #nfl-player-wrap *::before, #nfl-player-wrap *::after {
  box-sizing: border-box !important;
  font-family: 'Roboto Condensed', sans-serif !important;
}
#nfl-player-wrap { margin: 0 !important; padding: 0 !important; }

/* ── Body / page background ── */
body { background: #060a14; }

/* ── CSS variables (desktop-first) ── */
#nfl-player-wrap {
  --bg: #060a14;
  --surface: #0d1526;
  --surface2: #111d35;
  --border: #1e3058;
  --blue: #3b82f6;
  --blue-dim: #1d3f7a;
  --blue-glow: rgba(59,130,246,0.15);
  --header-bg: #14245c;
  --gold: #f59e0b;
  --text: #e2e8f0;
  --text-muted: #64748b;
  --text-dim: #94a3b8;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(59,130,246,0.07) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(255,255,255,0.01) 80px, rgba(255,255,255,0.01) 81px),
    repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(255,255,255,0.01) 80px, rgba(255,255,255,0.01) 81px);
  pointer-events: none;
  z-index: 0;
}

#nfl-player-wrap .wrap {
  position: relative !important;
  z-index: 1 !important;
  max-width: 1100px !important;
  margin: 0 auto !important;
  padding: 0 16px 60px !important;
  background: transparent !important;
}

/* ── SEARCH ── */
#nfl-player-wrap .search-section {
  padding: 32px 0 20px !important;
  text-align: center !important;
}
#nfl-player-wrap .search-box-wrap {
  position: relative !important;
  max-width: 560px !important;
  margin: 0 auto 28px !important;
}
#nfl-player-wrap #playerSearch {
  width: 100% !important;
  background: #0d1526 !important;
  border: 1.5px solid #1e3058 !important;
  color: #e2e8f0 !important;
  font-size: 19px !important;
  font-weight: 500 !important;
  padding: 16px 20px !important;
  border-radius: 10px !important;
  outline: none !important;
  transition: border-color 0.2s, box-shadow 0.2s !important;
  display: block !important;
}
#nfl-player-wrap #playerSearch:focus {
  border-color: #3b82f6 !important;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15) !important;
}
#nfl-player-wrap #playerSearch::placeholder { color: #64748b !important; }

/* ── AUTOCOMPLETE ── */
#nfl-player-wrap #autocomplete {
  position: absolute !important;
  top: calc(100% + 4px) !important;
  left: 0 !important; right: 0 !important;
  background: #111d35 !important;
  border: 1.5px solid #1e3058 !important;
  border-radius: 10px !important;
  max-height: 280px !important;
  overflow-y: auto !important;
  z-index: 200 !important;
  display: none;
  box-shadow: 0 8px 30px rgba(0,0,0,0.6) !important;
  text-align: left !important;
}
#nfl-player-wrap .ac-item {
  display: flex !important;
  align-items: center !important;
  gap: 12px !important;
  padding: 10px 16px !important;
  cursor: pointer !important;
  transition: background 0.15s !important;
  border-bottom: 1px solid rgba(30,48,88,0.5) !important;
}
#nfl-player-wrap .ac-item:last-child { border-bottom: none !important; }
#nfl-player-wrap .ac-item:hover, #nfl-player-wrap .ac-item.active { background: rgba(59,130,246,0.15) !important; }
#nfl-player-wrap .ac-pos {
  font-weight: 800 !important; font-size: 12px !important;
  letter-spacing: 1px !important; padding: 2px 7px !important;
  border-radius: 3px !important; min-width: 32px !important; text-align: center !important;
}
#nfl-player-wrap .ac-pos.QB { background: rgba(59,130,246,0.2) !important; color: #60a5fa !important; }
#nfl-player-wrap .ac-pos.RB { background: rgba(34,197,94,0.2) !important; color: #4ade80 !important; }
#nfl-player-wrap .ac-pos.WR { background: rgba(245,158,11,0.2) !important; color: #fbbf24 !important; }
#nfl-player-wrap .ac-pos.TE { background: rgba(168,85,247,0.2) !important; color: #c084fc !important; }
#nfl-player-wrap .ac-name { font-weight: 600 !important; font-size: 16px !important; color: #e2e8f0 !important; }
#nfl-player-wrap .ac-team { font-size: 13px !important; color: #64748b !important; margin-left: auto !important; letter-spacing: 1px !important; text-transform: uppercase !important; }

/* ── LEADERBOARD GRID — locked 4-col desktop ── */
#nfl-player-wrap .top5-section {
  display: grid !important;
  grid-template-columns: repeat(4, 1fr) !important;
  gap: 12px !important;
  margin-bottom: 32px !important;
  width: 100% !important;
}
#nfl-player-wrap .top5-card {
  background: #0d1526 !important;
  border: 1px solid #1e3058 !important;
  border-radius: 12px !important;
  overflow: hidden !important;
  display: flex !important;
  flex-direction: column !important;
  min-width: 0 !important;
}
#nfl-player-wrap .top5-body {
  max-height: 340px !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
}
#nfl-player-wrap .top5-head {
  display: flex !important;
  align-items: center !important;
  gap: 8px !important;
  padding: 10px 12px !important;
  border-bottom: 1px solid #1e3058 !important;
  background: rgba(20,36,92,0.5) !important;
  flex-wrap: nowrap !important;
}
#nfl-player-wrap .top5-pos {
  font-weight: 800 !important; font-size: 12px !important;
  letter-spacing: 1px !important; padding: 2px 7px !important;
  border-radius: 4px !important; flex-shrink: 0 !important;
  white-space: nowrap !important;
}
#nfl-player-wrap .top5-pos.QB { background: rgba(59,130,246,0.2) !important; color: #60a5fa !important; border: 1px solid rgba(59,130,246,0.3) !important; }
#nfl-player-wrap .top5-pos.RB { background: rgba(34,197,94,0.2) !important; color: #4ade80 !important; border: 1px solid rgba(34,197,94,0.3) !important; }
#nfl-player-wrap .top5-pos.WR { background: rgba(245,158,11,0.2) !important; color: #fbbf24 !important; border: 1px solid rgba(245,158,11,0.3) !important; }
#nfl-player-wrap .top5-pos.TE { background: rgba(168,85,247,0.2) !important; color: #c084fc !important; border: 1px solid rgba(168,85,247,0.3) !important; }
#nfl-player-wrap .top5-title {
  font-weight: 700 !important; font-size: 11px !important;
  letter-spacing: 1px !important; text-transform: uppercase !important;
  color: #94a3b8 !important; white-space: nowrap !important;
  overflow: hidden !important; text-overflow: ellipsis !important;
  flex: 1 !important; min-width: 0 !important;
}
#nfl-player-wrap .top5-stat-lbl {
  margin-left: auto !important; font-size: 10px !important;
  letter-spacing: 1px !important; color: #64748b !important;
  text-transform: uppercase !important; flex-shrink: 0 !important;
  white-space: nowrap !important;
}
#nfl-player-wrap .top5-row {
  display: grid !important;
  grid-template-columns: 22px 1fr auto !important;
  align-items: center !important;
  gap: 6px !important;
  padding: 8px 12px !important;
  border-bottom: 1px solid rgba(30,48,88,0.35) !important;
  cursor: pointer !important;
  transition: background 0.15s !important;
  min-width: 0 !important;
}
#nfl-player-wrap .top5-row:last-child { border-bottom: none !important; }
#nfl-player-wrap .top5-row:hover { background: rgba(59,130,246,0.15) !important; }
#nfl-player-wrap .top5-rank {
  font-weight: 800 !important; font-size: 12px !important;
  color: #64748b !important; text-align: center !important;
  flex-shrink: 0 !important; line-height: 1 !important;
}
#nfl-player-wrap .top5-rank.gold { color: #f59e0b !important; }
#nfl-player-wrap .top5-name {
  font-size: 13px !important; font-weight: 600 !important;
  color: #e2e8f0 !important; overflow: hidden !important;
  text-overflow: ellipsis !important; white-space: nowrap !important;
  min-width: 0 !important; line-height: 1.3 !important;
}
#nfl-player-wrap .top5-name small {
  display: block !important; font-size: 10px !important;
  font-weight: 400 !important; color: #64748b !important;
  letter-spacing: 1px !important; text-transform: uppercase !important;
  margin-top: 1px !important;
}
#nfl-player-wrap .top5-val {
  font-weight: 800 !important; font-size: 14px !important;
  color: #fff !important; flex-shrink: 0 !important; text-align: right !important;
}

/* ── LOADING ── */
#nfl-player-wrap #loadingMsg {
  text-align: center !important; padding: 50px 20px !important;
  color: #64748b !important; font-weight: 700 !important;
  font-size: 15px !important; letter-spacing: 2px !important;
  text-transform: uppercase !important;
}
#nfl-player-wrap .spinner {
  width: 28px !important; height: 28px !important;
  border: 3px solid #1e3058 !important;
  border-top-color: #3b82f6 !important;
  border-radius: 50% !important;
  animation: nfl-spin 0.8s linear infinite !important;
  margin: 0 auto 12px !important;
  display: block !important;
}
@keyframes nfl-spin { to { transform: rotate(360deg); } }

/* ── PLAYER CARD ── */
#nfl-player-wrap #playerCard { display: none; animation: nfl-fadeUp 0.35s ease; }
@keyframes nfl-fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Player header */
#nfl-player-wrap .player-header {
  background: linear-gradient(135deg, #14245c 0%, #0d1526 100%) !important;
  border: 1.5px solid #3b82f6 !important;
  border-radius: 14px !important;
  padding: 22px 26px !important;
  margin-bottom: 20px !important;
  display: flex !important;
  align-items: center !important;
  gap: 18px !important;
  flex-wrap: nowrap !important;
  position: relative !important;
  overflow: hidden !important;
}
#nfl-player-wrap .header-logo {
  margin-left: auto !important; display: flex !important;
  align-items: center !important; flex-shrink: 0 !important;
  position: relative !important; z-index: 1 !important;
}
#nfl-player-wrap .header-logo img {
  height: 44px !important; width: auto !important;
  max-width: 110px !important; object-fit: contain !important;
  opacity: 0.95 !important;
}
#nfl-player-wrap .header-logo-fallback {
  font-weight: 900 !important; font-size: 22px !important;
  letter-spacing: 2px !important; color: #3b82f6 !important;
  text-transform: uppercase !important;
}
#nfl-player-wrap .back-btn {
  background: rgba(59,130,246,0.1) !important;
  border: 1px solid rgba(59,130,246,0.3) !important;
  color: #60a5fa !important; font-weight: 700 !important;
  font-size: 13px !important; letter-spacing: 1.5px !important;
  text-transform: uppercase !important; padding: 7px 16px !important;
  border-radius: 6px !important; cursor: pointer !important;
  margin-bottom: 16px !important; display: inline-block !important;
}
#nfl-player-wrap .pos-badge {
  font-weight: 900 !important; font-size: 28px !important;
  letter-spacing: 1px !important; padding: 8px 16px !important;
  border-radius: 8px !important; line-height: 1 !important; flex-shrink: 0 !important;
}
#nfl-player-wrap .pos-badge.QB { background: rgba(59,130,246,0.15) !important; border: 1.5px solid rgba(59,130,246,0.4) !important; color: #60a5fa !important; }
#nfl-player-wrap .pos-badge.RB { background: rgba(34,197,94,0.15) !important; border: 1.5px solid rgba(34,197,94,0.4) !important; color: #4ade80 !important; }
#nfl-player-wrap .pos-badge.WR { background: rgba(245,158,11,0.15) !important; border: 1.5px solid rgba(245,158,11,0.4) !important; color: #fbbf24 !important; }
#nfl-player-wrap .pos-badge.TE { background: rgba(168,85,247,0.15) !important; border: 1.5px solid rgba(168,85,247,0.4) !important; color: #c084fc !important; }
#nfl-player-wrap .player-info { flex: 1 !important; min-width: 0 !important; }
#nfl-player-wrap .player-name {
  font-weight: 900 !important; font-size: clamp(26px,5vw,38px) !important;
  text-transform: uppercase !important; letter-spacing: 2px !important;
  line-height: 1 !important; color: #fff !important;
}
#nfl-player-wrap .player-meta {
  font-size: 14px !important; color: #ffffff !important;
  margin-top: 5px !important; letter-spacing: 1.5px !important;
  text-transform: uppercase !important; font-weight: 600 !important;
}
#nfl-player-wrap .player-meta span { color: #3b82f6 !important; }

/* ── TABS ── */
#nfl-player-wrap .tabs {
  display: flex !important; gap: 4px !important;
  background: #0d1526 !important; border: 1.5px solid #1e3058 !important;
  border-radius: 10px !important; padding: 4px !important;
  margin-bottom: 18px !important; overflow-x: auto !important;
  overflow-y: hidden !important; -webkit-overflow-scrolling: touch !important;
  scrollbar-width: none !important; flex-wrap: nowrap !important;
}
#nfl-player-wrap .tabs::-webkit-scrollbar { display: none !important; }
#nfl-player-wrap .tab-btn {
  flex: 1 !important; min-width: 70px !important;
  background: none !important; border: none !important;
  color: #64748b !important; font-weight: 700 !important;
  font-size: 13px !important; letter-spacing: 1.5px !important;
  text-transform: uppercase !important; padding: 9px 12px !important;
  border-radius: 7px !important; cursor: pointer !important;
  transition: all 0.2s !important; white-space: nowrap !important;
}
#nfl-player-wrap .tab-btn.active { background: #3b82f6 !important; color: #fff !important; }
#nfl-player-wrap .tab-btn:hover:not(.active) { background: rgba(59,130,246,0.15) !important; color: #e2e8f0 !important; }
#nfl-player-wrap .tab-panel { display: none !important; }
#nfl-player-wrap .tab-panel.active { display: block !important; }

/* ── STAT SECTION TITLE ── */
#nfl-player-wrap .stat-section-title {
  font-weight: 800 !important; font-size: 13px !important;
  letter-spacing: 3px !important; text-transform: uppercase !important;
  color: #3b82f6 !important; margin: 20px 0 12px !important;
  padding-bottom: 7px !important; border-bottom: 1px solid #1e3058 !important;
}

/* ── STAT GRID — always auto-fill, min 148px ── */
#nfl-player-wrap .stat-grid {
  display: grid !important;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)) !important;
  gap: 10px !important;
}
#nfl-player-wrap .stat-card {
  background: #0d1526 !important; border: 1px solid #1e3058 !important;
  border-radius: 10px !important; padding: 16px 14px !important;
  position: relative !important; overflow: hidden !important;
  transition: border-color 0.2s, transform 0.15s !important;
}
#nfl-player-wrap .stat-card:hover { border-color: #1d3f7a !important; transform: translateY(-1px) !important; }
#nfl-player-wrap .stat-card::after {
  content: '' !important; position: absolute !important;
  bottom: 0 !important; left: 0 !important; right: 0 !important;
  height: 3px !important; background: var(--perc-color, #1e3058) !important;
}
#nfl-player-wrap .stat-label {
  font-weight: 600 !important; font-size: 12px !important;
  letter-spacing: 1px !important; text-transform: uppercase !important;
  color: #fff !important; margin-bottom: 6px !important;
  white-space: nowrap !important; overflow: hidden !important;
  text-overflow: ellipsis !important;
  border-bottom: 1px solid rgba(255,255,255,0.12) !important;
  padding-bottom: 5px !important;
}
#nfl-player-wrap .stat-value {
  font-weight: 800 !important; font-size: 30px !important;
  line-height: 1 !important; color: #fff !important;
}
#nfl-player-wrap .stat-perc {
  font-size: 13px !important; color: #64748b !important; margin-top: 5px !important;
}

/* ── PERCENTILE BARS ── */
#nfl-player-wrap .perc-bar-wrap {
  margin-top: 20px !important; background: #0d1526 !important;
  border: 1px solid #1e3058 !important; border-radius: 10px !important;
  padding: 20px !important;
}
#nfl-player-wrap .perc-bar-title {
  font-weight: 800 !important; font-size: 13px !important;
  letter-spacing: 2.5px !important; text-transform: uppercase !important;
  color: #fff !important; margin-bottom: 16px !important;
  border-bottom: 1px solid rgba(255,255,255,0.12) !important;
  padding-bottom: 8px !important; line-height: 1.4 !important;
}
#nfl-player-wrap .perc-row {
  display: grid !important;
  grid-template-columns: 160px 1fr 42px !important;
  align-items: center !important; gap: 12px !important; margin-bottom: 12px !important;
}
#nfl-player-wrap .perc-name {
  font-size: 14px !important; font-weight: 600 !important;
  color: #fff !important; white-space: nowrap !important;
  overflow: hidden !important; text-overflow: ellipsis !important;
}
#nfl-player-wrap .perc-track {
  background: #111d35 !important; border-radius: 99px !important;
  height: 8px !important; overflow: hidden !important;
}
#nfl-player-wrap .perc-fill { height: 100% !important; border-radius: 99px !important; transition: width 0.6s cubic-bezier(0.4,0,0.2,1) !important; }
#nfl-player-wrap .perc-num { font-weight: 800 !important; font-size: 15px !important; text-align: right !important; }

#nfl-player-wrap #emptyState {
  text-align: center !important; padding: 60px 20px !important;
  color: #64748b !important; display: none;
}
#nfl-player-wrap #emptyState p {
  font-weight: 700 !important; font-size: 16px !important;
  letter-spacing: 2px !important; text-transform: uppercase !important;
}

/* ═══════════════════════════════════════════
   TABLET  ≤ 900px
═══════════════════════════════════════════ */
@media (max-width: 900px) {
  #nfl-player-wrap .top5-section {
    grid-template-columns: repeat(2, 1fr) !important;
  }
}

/* ═══════════════════════════════════════════
   MOBILE  ≤ 600px  — ALL rules !important
═══════════════════════════════════════════ */
@media (max-width: 600px) {
  #nfl-player-wrap .wrap        { padding: 0 10px 50px !important; }
  #nfl-player-wrap .search-section { padding: 20px 0 14px !important; }
  #nfl-player-wrap #playerSearch   { font-size: 16px !important; padding: 13px 14px !important; }

  /* Leaderboard: force 2-col, no exceptions */
  #nfl-player-wrap .top5-section {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 8px !important;
  }
  #nfl-player-wrap .top5-body   { max-height: 260px !important; }
  #nfl-player-wrap .top5-head   { padding: 8px 8px !important; gap: 4px !important; }
  #nfl-player-wrap .top5-pos    { font-size: 10px !important; padding: 2px 4px !important; letter-spacing: 0 !important; }
  #nfl-player-wrap .top5-title  { font-size: 9px !important; letter-spacing: 0 !important; }
  #nfl-player-wrap .top5-stat-lbl { font-size: 8px !important; }
  #nfl-player-wrap .top5-row    { grid-template-columns: 16px 1fr auto !important; padding: 6px 8px !important; gap: 4px !important; }
  #nfl-player-wrap .top5-rank   { font-size: 10px !important; }
  #nfl-player-wrap .top5-name   { font-size: 11px !important; }
  #nfl-player-wrap .top5-name small { font-size: 8px !important; margin-top: 0 !important; }
  #nfl-player-wrap .top5-val    { font-size: 12px !important; }

  /* Player header */
  #nfl-player-wrap .player-header { padding: 12px 14px !important; gap: 10px !important; flex-wrap: nowrap !important; }
  #nfl-player-wrap .header-logo   { display: none !important; }
  #nfl-player-wrap .pos-badge     { font-size: 16px !important; padding: 5px 8px !important; }
  #nfl-player-wrap .player-name   { font-size: clamp(16px, 6vw, 26px) !important; letter-spacing: 1px !important; }
  #nfl-player-wrap .player-meta   { font-size: 9px !important; letter-spacing: 0.3px !important; }
  #nfl-player-wrap .back-btn      { font-size: 11px !important; padding: 6px 12px !important; }

  /* Tabs */
  #nfl-player-wrap .tabs    { padding: 3px !important; gap: 2px !important; }
  #nfl-player-wrap .tab-btn {
    font-size: 9px !important; padding: 7px 4px !important;
    min-width: 0 !important; letter-spacing: 0.3px !important; flex: 1 1 0 !important;
  }

  /* Stat titles */
  #nfl-player-wrap .stat-section-title { font-size: 10px !important; letter-spacing: 1px !important; margin: 10px 0 7px !important; }

  /* Stat grid: force 2 columns */
  #nfl-player-wrap .stat-grid {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 7px !important;
  }
  #nfl-player-wrap .stat-card  { padding: 10px 9px !important; }
  #nfl-player-wrap .stat-label { font-size: 9px !important; letter-spacing: 0.2px !important; padding-bottom: 3px !important; margin-bottom: 4px !important; }
  #nfl-player-wrap .stat-value { font-size: 22px !important; }
  #nfl-player-wrap .stat-perc  { font-size: 10px !important; }

  /* Percentile bars */
  #nfl-player-wrap .perc-bar-wrap  { padding: 12px 10px !important; }
  #nfl-player-wrap .perc-bar-title { font-size: 9px !important; letter-spacing: 0.8px !important; margin-bottom: 10px !important; padding-bottom: 5px !important; }
  #nfl-player-wrap .perc-row       { grid-template-columns: 88px 1fr 38px !important; gap: 6px !important; margin-bottom: 7px !important; }
  #nfl-player-wrap .perc-name      { font-size: 10px !important; }
  #nfl-player-wrap .perc-track     { height: 6px !important; }
  #nfl-player-wrap .perc-num       { font-size: 11px !important; }
}

/* ═══════════════════════════════════════════
   VERY SMALL  ≤ 360px
═══════════════════════════════════════════ */
@media (max-width: 360px) {
  #nfl-player-wrap .top5-section   { grid-template-columns: repeat(2, 1fr) !important; }
  #nfl-player-wrap .perc-row       { grid-template-columns: 72px 1fr 34px !important; }
  #nfl-player-wrap .stat-value     { font-size: 18px !important; }
  #nfl-player-wrap .player-name    { font-size: 15px !important; }
  #nfl-player-wrap .tab-btn        { font-size: 8px !important; padding: 6px 3px !important; }
}
</style>
</head>
<body>
<div id="nfl-player-wrap">
<div class="wrap">

  <div class="search-section">
    <div class="search-box-wrap">
      <input type="text" id="playerSearch" placeholder="Search player name..." autocomplete="off">
      <div id="autocomplete"></div>
    </div>
  </div>

  <div id="loadingMsg">
    <span class="spinner"></span>
    LOADING PLAYER DATA...
  </div>

  <div id="top5Section" style="display:none">
    <div id="top5Grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:28px;width:100%;"></div>
  </div>

  <div id="emptyState"><p>No player found. Try a different name.</p></div>
  <div id="playerCard"></div>

</div>
</div>

<script>
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

const SHEETS = {
  QB:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1152850061&single=true&output=csv',
  RB:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1056171373&single=true&output=csv',
  REC: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1048851676&single=true&output=csv'
};

const _cache = {};
let allPlayers = [];

async function fetchWithFallback(url) {
  if (_cache[url]) return _cache[url];
  let lastErr;
  for (const makeProxy of PROXIES) {
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 7000);
      const res = await fetch(makeProxy(url), { signal: controller.signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      if (!text || text.trim().length < 50) throw new Error('Empty');
      _cache[url] = text;
      return text;
    } catch(e) { lastErr = e; }
  }
  throw lastErr || new Error('All proxies failed');
}

async function fetchCSV(url) {
  return parseCSV(await fetchWithFallback(url));
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').replace(/\r/g,''));
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line);
    const obj = {};
    headers.forEach((h,i) => { obj[h] = (vals[i]||'').trim().replace(/^"|"$/g,'').replace(/\r/g,''); });
    return obj;
  });
}

function splitCSVLine(line) {
  const result=[]; let inQ=false, cur='';
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur);cur='';}
    else cur+=c;
  }
  result.push(cur);
  return result;
}

function setLeaderCols() {
  const g = document.getElementById('top5Grid');
  if (!g) return;
  g.style.gridTemplateColumns = window.innerWidth >= 900 ? 'repeat(4,1fr)' : 'repeat(2,1fr)';
}
window.addEventListener('resize', setLeaderCols);

async function loadAll(isRetry=false) {
  try {
    const [qbData,rbData,recData] = await Promise.all([fetchCSV(SHEETS.QB),fetchCSV(SHEETS.RB),fetchCSV(SHEETS.REC)]);
    qbData.forEach(row=>{ const name=row['display_name']; if(name) allPlayers.push({name,pos:'QB',team:row['posteam']||row['team_abbr']||'',data:row,sheet:'QB'}); });
    rbData.forEach(row=>{ const name=row['display_name']; if(name) allPlayers.push({name,pos:'RB',team:row['posteam']||row['team_abbr']||'',data:row,sheet:'RB'}); });
    recData.forEach(row=>{ const name=row['display_name']; const pos=(row['player_position']||'WR').trim().toUpperCase(); if(name) allPlayers.push({name,pos:pos==='TE'?'TE':'WR',team:row['posteam']||row['team_abbr']||'',data:row,sheet:'REC'}); });
    document.getElementById('loadingMsg').style.display='none';
    buildTop5();
    setLeaderCols();
    document.getElementById('top5Section').style.display='block';
  } catch(e) {
    if(isRetry){
      document.getElementById('loadingMsg').innerHTML=`<p style="color:#ef4444;font-family:'Roboto Condensed',sans-serif;font-size:15px;margin-bottom:14px">Failed to load data.</p><button onclick="location.reload()" style="background:#3b82f6;border:none;color:#fff;font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;padding:10px 24px;border-radius:7px;cursor:pointer;">Reload Page</button>`;
    } else {
      document.getElementById('loadingMsg').innerHTML=`<span class="spinner"></span>RETRYING...`;
      setTimeout(()=>loadAll(true),1500);
    }
  }
}

function buildTop5() {
  const grid = document.getElementById('top5Grid');
  const top = (pos,stat) => allPlayers.filter(p=>p.pos===pos).sort((a,b)=>parseFloat(b.data[stat]||0)-parseFloat(a.data[stat]||0));

  const posColors = {
    QB:{bg:'rgba(59,130,246,0.2)',color:'#60a5fa',border:'rgba(59,130,246,0.3)'},
    RB:{bg:'rgba(34,197,94,0.2)', color:'#4ade80',border:'rgba(34,197,94,0.3)'},
    WR:{bg:'rgba(245,158,11,0.2)',color:'#fbbf24',border:'rgba(245,158,11,0.3)'},
    TE:{bg:'rgba(168,85,247,0.2)',color:'#c084fc',border:'rgba(168,85,247,0.3)'},
  };
  const groups = [
    {pos:'QB',label:'Pass Yards',stat:'YDS',players:top('QB','YDS')},
    {pos:'RB',label:'Rush Yards',stat:'YDS',players:top('RB','YDS')},
    {pos:'WR',label:'Rec Yards', stat:'YDS',players:top('WR','YDS')},
    {pos:'TE',label:'Rec Yards', stat:'YDS',players:top('TE','YDS')},
  ];

  grid.innerHTML = groups.map(g => {
    const pc = posColors[g.pos];
    return `<div style="background:#0d1526;border:1px solid #1e3058;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;min-width:0;">
      <div style="display:flex;align-items:center;gap:6px;padding:9px 10px;border-bottom:1px solid #1e3058;background:rgba(20,36,92,0.5);overflow:hidden;">
        <span style="background:${pc.bg};color:${pc.color};border:1px solid ${pc.border};font-family:'Roboto Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:1px;padding:2px 6px;border-radius:4px;flex-shrink:0;white-space:nowrap;">${g.pos}</span>
        <span style="font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;">${g.label}</span>
        <span style="font-family:'Roboto Condensed',sans-serif;font-size:9px;letter-spacing:1px;color:#64748b;text-transform:uppercase;flex-shrink:0;white-space:nowrap;padding-left:4px;">YDS</span>
      </div>
      <div style="overflow-y:auto;max-height:300px;">
        <table style="width:100%;border-collapse:collapse;table-layout:fixed;">
          <colgroup><col style="width:24px;"><col><col style="width:52px;"></colgroup>
          <tbody>${g.players.map((p,i)=>{
            const bg = i%2===0?'#0d1526':'#060a14';
            return `<tr style="background:${bg};cursor:pointer;border-bottom:1px solid rgba(30,48,88,0.3);"
              onclick="clickTop5('${p.name.replace(/'/g,"\\'")}')"
              onmouseover="this.style.background='rgba(59,130,246,0.15)'"
              onmouseout="this.style.background='${bg}'">
              <td style="padding:7px 2px 7px 8px;font-family:'Roboto Condensed',sans-serif;font-weight:800;font-size:11px;color:${i===0?'#f59e0b':'#64748b'};text-align:center;vertical-align:middle;white-space:nowrap;">${i+1}</td>
              <td style="padding:7px 4px;vertical-align:middle;overflow:hidden;max-width:0;">
                <div style="font-family:'Roboto Condensed',sans-serif;font-weight:600;font-size:12px;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
                <div style="font-family:'Roboto Condensed',sans-serif;font-size:9px;color:#64748b;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.team}</div>
              </td>
              <td style="padding:7px 8px 7px 2px;font-family:'Roboto Condensed',sans-serif;font-weight:800;font-size:13px;color:#fff;text-align:right;vertical-align:middle;white-space:nowrap;">${fmt(p.data[g.stat],0)}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}
function clickTop5(name) {
  const player = allPlayers.find(p=>p.name===name);
  if(player){ document.getElementById('playerSearch').value=player.name; selectPlayer(player); }
}

const searchInput = document.getElementById('playerSearch');
const acDiv = document.getElementById('autocomplete');
let acIndex = -1;

searchInput.addEventListener('input',()=>{
  const q=searchInput.value.trim().toLowerCase();
  acIndex=-1;
  if(!q){ acDiv.style.display='none'; if(allPlayers.length){ document.getElementById('top5Section').style.display='block'; document.getElementById('playerCard').style.display='none'; document.getElementById('emptyState').style.display='none'; } return; }
  if(!allPlayers.length) return;
  const matches=allPlayers.filter(p=>p.name.toLowerCase().includes(q)).slice(0,10);
  if(!matches.length){acDiv.style.display='none';return;}
  acDiv.innerHTML=matches.map((p,i)=>`<div class="ac-item" data-idx="${i}"><span class="ac-pos ${p.pos}">${p.pos}</span><span class="ac-name">${p.name}</span><span class="ac-team">${p.team}</span></div>`).join('');
  acDiv.style.display='block';
  acDiv._matches=matches;
  acDiv.querySelectorAll('.ac-item').forEach(item=>{ item.addEventListener('click',()=>{ const m=acDiv._matches[+item.dataset.idx]; searchInput.value=m.name; acDiv.style.display='none'; selectPlayer(m); }); });
});

searchInput.addEventListener('keydown',e=>{
  const items=acDiv.querySelectorAll('.ac-item');
  if(e.key==='ArrowDown'){acIndex=Math.min(acIndex+1,items.length-1);hlAC(items);e.preventDefault();}
  else if(e.key==='ArrowUp'){acIndex=Math.max(acIndex-1,0);hlAC(items);e.preventDefault();}
  else if(e.key==='Enter'&&acIndex>=0&&acDiv._matches){const m=acDiv._matches[acIndex];searchInput.value=m.name;acDiv.style.display='none';selectPlayer(m);}
  else if(e.key==='Escape') acDiv.style.display='none';
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-box-wrap')) acDiv.style.display='none';});
function hlAC(items){items.forEach((item,i)=>item.classList.toggle('active',i===acIndex));}

function fmt(val,dec=1){if(val===null||val===undefined||val===''||isNaN(+val))return'—';return parseFloat(val).toFixed(dec);}
function fmtPct(val){if(!val||isNaN(+val))return'—';const n=parseFloat(val);const scaled=Math.abs(n)<=1.5?n*100:n;return scaled.toFixed(1)+'%';}
function fmtNum(val,dec=2){if(val===null||val===undefined||val===''||isNaN(+val))return'—';return parseFloat(val).toFixed(dec)+'%';}
function ordinal(n){const r=n%100;if(r>=11&&r<=13)return n+'th';switch(n%10){case 1:return n+'st';case 2:return n+'nd';case 3:return n+'rd';default:return n+'th';}}
function percColor(v){const n=parseFloat(v);if(isNaN(n))return'#64748b';if(n>=80)return'#22c55e';if(n>=60)return'#86efac';if(n>=40)return'#fbbf24';if(n>=20)return'#f97316';return'#ef4444';}
function percLabel(v){const n=parseFloat(v);if(isNaN(n))return'';return`<span style="color:${percColor(n)};font-weight:800;font-size:14px;font-family:'Roboto Condensed',sans-serif">${ordinal(Math.round(n))}</span>`;}
function statCard(label,value,percVal){const color=percColor(parseFloat(percVal));return`<div class="stat-card" style="--perc-color:${color}"><div class="stat-label">${label}</div><div class="stat-value">${value}</div>${percVal?`<div class="stat-perc">${percLabel(percVal)} <span style="color:#64748b;font-size:10px">pctl</span></div>`:''}</div>`;}
function percBar(label,val){const n=parseFloat(val);const pct=isNaN(n)?0:Math.min(Math.max(n,0),100);const color=percColor(n);return`<div class="perc-row"><div class="perc-name">${label}</div><div class="perc-track"><div class="perc-fill" style="width:${pct}%;background:${color}"></div></div><div class="perc-num" style="color:${color}">${isNaN(n)?'—':ordinal(Math.round(n))}</div></div>`;}

function selectPlayer(player){
  document.getElementById('top5Section').style.display='none';
  document.getElementById('emptyState').style.display='none';
  const card=document.getElementById('playerCard');
  card.style.display='block';
  const d=player.data;
  if(player.sheet==='QB') renderQB(player,d,card);
  else if(player.sheet==='RB') renderRB(player,d,card);
  else renderREC(player,d,card);
  window.scrollTo({top:0,behavior:'smooth'});
}

function goBack(){
  document.getElementById('playerCard').style.display='none';
  document.getElementById('top5Section').style.display='block';
  document.getElementById('playerSearch').value='';
  window.scrollTo({top:0,behavior:'smooth'});
}

function playerHeader(player){return`
  <button class="back-btn" onclick="goBack()">&#8592; Back to Leaders</button>
  <div class="player-header">
    <div class="pos-badge ${player.pos}">${player.pos}</div>
    <div class="player-info">
      <div class="player-name">${player.name}</div>
      <div class="player-meta"><span>${player.team||'NFL'}</span> &nbsp;&middot;&nbsp; 2025-26 Season &nbsp;&middot;&nbsp; Data: xEP Network</div>
    </div>
    <div class="header-logo">
      <img src="https://xep.ai/wp-content/uploads/2024/07/Logo-PNG-2-1.png" alt="xEP" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="header-logo-fallback" style="display:none"><span>x</span>EP</div>
    </div>
  </div>`;}

function tabsHTML(tabs){return`<div class="tabs">${tabs.map((t,i)=>{const id=t.replace(/\s+/g,'-').replace(/[^a-zA-Z0-9-]/g,'').replace(/-+/g,'-');const label=t.replace(/\+/g,' & ');return`<button class="tab-btn${i===0?' active':''}" data-tab="${id}">${label}</button>`;}).join('')}</div>`;}

function applyGridStyles(root) {
  // Force stat grids with inline style - immune to WP override
  const isMobile = window.innerWidth < 600;
  root.querySelectorAll('.stat-grid').forEach(el => {
    el.style.cssText = 'display:grid!important;' +
      'grid-template-columns:' + (isMobile ? 'repeat(2,1fr)' : 'repeat(auto-fill,minmax(148px,1fr))') + '!important;' +
      'gap:' + (isMobile ? '7px' : '10px') + '!important;';
  });
}
window.addEventListener('resize', () => {
  const card = document.getElementById('playerCard');
  if (card && card.style.display !== 'none') applyGridStyles(card);
});

function initTabs(card){
  applyGridStyles(card);
  card.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      card.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      card.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      const panel=card.querySelector(`#tab-${btn.dataset.tab}`);
      if(panel) { panel.classList.add('active'); applyGridStyles(panel); }
    });
  });
}

function renderQB(player,d,card){card.innerHTML=`${playerHeader(player)}${tabsHTML(['Overview','Accuracy','Depth','Situation','Pressure'])}<div id="tab-Overview" class="tab-panel active"><div class="stat-section-title">Core Stats</div><div class="stat-grid">${statCard('Completions',fmt(d['CMP'],0),d['CMP_PERC'])}${statCard('Attempts',fmt(d['ATT'],0),d['ATT_PERC'])}${statCard('Comp %',fmtPct(d['CMP%']),d['CMP%_PERC'])}${statCard('Pass Yards',fmt(d['YDS'],0),d['YDS_PERC'])}${statCard('Touchdowns',fmt(d['TD'],0),d['TD_PERC'])}${statCard('Interceptions',fmt(d['INT'],0),d['INT_PERC'])}${statCard('Passer Rating',fmt(d['passer_rating'],1),d['passer_rating_PERC'])}${statCard('Success %',fmtPct(d['SuccessPct']),d['SuccessPct_PERC'])}${statCard('EPA',fmt(d['EPA'],2),d['EPA_PERC'])}${statCard('CPOE',fmtNum(d['CPOE'],2),d['CPOE_PERC'])}${statCard('ADOT',fmt(d['IAY'],2),d['IAY_PERC'])}${statCard('YAC',fmt(d['YAC'],1),d['YAC_PERC'])}</div><div class="perc-bar-wrap"><div class="perc-bar-title">Percentile Rankings</div>${percBar('Completion %',d['CMP%_PERC'])}${percBar('Pass Yards',d['YDS_PERC'])}${percBar('Touchdowns',d['TD_PERC'])}${percBar('Passer Rating',d['passer_rating_PERC'])}${percBar('EPA',d['EPA_PERC'])}${percBar('CPOE',d['CPOE_PERC'])}${percBar('Success %',d['SuccessPct_PERC'])}</div></div><div id="tab-Accuracy" class="tab-panel"><div class="stat-section-title">Accuracy Metrics</div><div class="stat-grid">${statCard('On-Target %',fmtPct(d['on_tgt_pct']),d['on_tgt_pct_PERC'])}${statCard('On-Target Throws',fmt(d['on_tgt_throws'],0),d['on_tgt_throws_PERC'])}${statCard('Bad Throws',fmt(d['bad_throws'],0),d['bad_throws_PERC'])}${statCard('Drops',fmt(d['drops'],0),d['drops_PERC'])}${statCard('Throwaways',fmt(d['throwaways'],0),d['throwaways_PERC'])}${statCard('CPOE',fmtNum(d['CPOE'],2),d['CPOE_PERC'])}</div><div class="perc-bar-wrap"><div class="perc-bar-title">Accuracy Percentiles</div>${percBar('On-Target %',d['on_tgt_pct_PERC'])}${percBar('CPOE',d['CPOE_PERC'])}${percBar('Bad Throws',d['bad_throws_PERC'])}${percBar('Throwaways',d['throwaways_PERC'])}${percBar('Drops',d['drops_PERC'])}</div></div><div id="tab-Depth" class="tab-panel"><div class="stat-section-title">Short (0–9 yds)</div><div class="stat-grid">${statCard('Attempts',fmt(d['Short_ATT'],0),d['Short_ATT_PERC'])}${statCard('Comp %',fmtPct(d['Short_CMPpct']),d['Short_CMPpct_PERC'])}${statCard('Yards',fmt(d['Short_YDS'],0),d['Short_YDS_PERC'])}${statCard('EPA',fmt(d['Short_EPA'],2),d['Short_EPA_PERC'])}${statCard('CPOE',fmtNum(d['Short_CPOE'],2),d['Short_CPOE_PERC'])}</div><div class="stat-section-title">Intermediate (10–19 yds)</div><div class="stat-grid">${statCard('Attempts',fmt(d['Intermediate_ATT'],0),d['Intermediate_ATT_PERC'])}${statCard('Comp %',fmtPct(d['Intermediate_CMPpct']),d['Intermediate_CMPpct_PERC'])}${statCard('Yards',fmt(d['Intermediate_YDS'],0),d['Intermediate_YDS_PERC'])}${statCard('EPA',fmt(d['Intermediate_EPA'],2),d['Intermediate_EPA_PERC'])}${statCard('CPOE',fmtNum(d['Intermediate_CPOE'],2),d['Intermediate_CPOE_PERC'])}</div><div class="stat-section-title">Deep (20+ yds)</div><div class="stat-grid">${statCard('Attempts',fmt(d['Deep_ATT'],0),d['Deep_ATT_PERC'])}${statCard('Comp %',fmtPct(d['Deep_CMPpct']),d['Deep_CMPpct_PERC'])}${statCard('Yards',fmt(d['Deep_YDS'],0),d['Deep_YDS_PERC'])}${statCard('EPA',fmt(d['Deep_EPA'],2),d['Deep_EPA_PERC'])}${statCard('CPOE',fmtNum(d['Deep_CPOE'],2),d['Deep_CPOE_PERC'])}</div></div><div id="tab-Situation" class="tab-panel"><div class="stat-section-title">By Down</div><div class="stat-grid">${statCard('3rd Dn Att',fmt(d['Third_ATT'],0),d['Third_ATT_PERC'])}${statCard('3rd Dn CMP%',fmtPct(d['Third_CMPpct']),d['Third_CMPpct_PERC'])}${statCard('3rd Dn Yards',fmt(d['Third_YDS'],0),d['Third_YDS_PERC'])}${statCard('3rd Dn EPA',fmt(d['Third_EPA'],2),d['Third_EPA_PERC'])}${statCard('4th Dn Att',fmt(d['Fourth_ATT'],0),d['Fourth_ATT_PERC'])}${statCard('4th Dn CMP%',fmtPct(d['Fourth_CMPpct']),d['Fourth_CMPpct_PERC'])}${statCard('4t
