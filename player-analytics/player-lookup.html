<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFL Player Analytics | 2024 Season</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060a14;
    --surface: #0d1526;
    --surface2: #111d35;
    --border: #1e3058;
    --blue: #3b82f6;
    --blue-dim: #1d3f7a;
    --blue-glow: rgba(59,130,246,0.15);
    --header-bg: #14245c;
    --gold: #f59e0b;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto Condensed', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(59,130,246,0.07) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(255,255,255,0.01) 80px, rgba(255,255,255,0.01) 81px),
      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(255,255,255,0.01) 80px, rgba(255,255,255,0.01) 81px);
    pointer-events: none;
    z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 16px 60px; }

  /* SEARCH */
  .search-section { padding: 32px 0 20px; text-align: center; }
  .search-box-wrap { position: relative; max-width: 560px; margin: 0 auto 28px; }
  #playerSearch {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 19px;
    font-weight: 500;
    padding: 16px 20px;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #playerSearch:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
  #playerSearch::placeholder { color: var(--text-muted); }

  /* AUTOCOMPLETE */
  #autocomplete {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    max-height: 280px;
    overflow-y: auto;
    z-index: 200;
    display: none;
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    text-align: left;
  }
  #autocomplete::-webkit-scrollbar { width: 4px; }
  #autocomplete::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .ac-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(30,48,88,0.5);
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.active { background: var(--blue-glow); }
  .ac-pos {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 3px;
    min-width: 32px;
    text-align: center;
  }
  .ac-pos.QB { background: rgba(59,130,246,0.2); color: #60a5fa; }
  .ac-pos.RB { background: rgba(34,197,94,0.2); color: #4ade80; }
  .ac-pos.WR { background: rgba(245,158,11,0.2); color: #fbbf24; }
  .ac-pos.TE { background: rgba(168,85,247,0.2); color: #c084fc; }
  .ac-name { font-weight: 600; font-size: 16px; }
  .ac-team { font-size: 13px; color: var(--text-muted); margin-left: auto; font-family: 'Roboto Condensed', sans-serif; letter-spacing: 1px; text-transform: uppercase; }

  /* TOP 5 TABLES — locked layout, never changes */
  .top5-section {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 32px;
    width: 100%;
  }

  .top5-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .top5-body {
    max-height: 340px;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .top5-body::-webkit-scrollbar { width: 4px; }
  .top5-body::-webkit-scrollbar-track { background: transparent; }
  .top5-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .top5-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(20,36,92,0.5);
  }
  .top5-pos {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .top5-pos.QB { background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
  .top5-pos.RB { background: rgba(34,197,94,0.2); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .top5-pos.WR { background: rgba(245,158,11,0.2); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .top5-pos.TE { background: rgba(168,85,247,0.2); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }
  .top5-title {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .top5-stat-lbl {
    margin-left: auto;
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
    flex-shrink: 0;
  }
  /* Use table-like structure for rows to prevent layout shifts */
  .top5-row {
    display: grid;
    grid-template-columns: 22px 1fr auto;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-bottom: 1px solid rgba(30,48,88,0.35);
    cursor: pointer;
    transition: background 0.15s;
    min-width: 0;
  }
  .top5-row:last-child { border-bottom: none; }
  .top5-row:hover { background: var(--blue-glow); }
  .top5-rank {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 800;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    flex-shrink: 0;
    line-height: 1;
  }
  .top5-rank.gold { color: var(--gold); }
  .top5-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
    font-family: 'Roboto Condensed', sans-serif;
    line-height: 1.3;
  }
  .top5-name small {
    display: block;
    font-size: 10px;
    font-weight: 400;
    color: var(--text-muted);
    font-family: 'Roboto Condensed', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .top5-val {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: #fff;
    flex-shrink: 0;
    text-align: right;
  }

  /* LOADING */
  #loadingMsg {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-muted);
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
    display: block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* PLAYER CARD */
  #playerCard { display: none; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .player-header {
    background: linear-gradient(135deg, var(--header-bg) 0%, var(--surface) 100%);
    border: 1.5px solid var(--blue);
    border-radius: 14px;
    padding: 22px 26px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: nowrap;
    position: relative;
    overflow: hidden;
  }
  .player-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-logo {
    margin-left: auto;
    display: flex;
    align-items: center;
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }
  .header-logo img {
    height: 44px;
    width: auto;
    max-width: 110px;
    object-fit: contain;
    filter: drop-shadow(0 0 8px rgba(59,130,246,0.3));
    opacity: 0.95;
  }
  .header-logo-fallback {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--blue);
    text-transform: uppercase;
  }
  .header-logo-fallback span { color: #fff; }
  .back-btn {
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.3);
    color: #60a5fa;
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 16px;
    display: inline-block;
  }
  .back-btn:hover { background: rgba(59,130,246,0.2); }
  .pos-badge {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 1px;
    padding: 8px 16px;
    border-radius: 8px;
    line-height: 1;
    flex-shrink: 0;
  }
  .pos-badge.QB { background: rgba(59,130,246,0.15); border: 1.5px solid rgba(59,130,246,0.4); color: #60a5fa; }
  .pos-badge.RB { background: rgba(34,197,94,0.15); border: 1.5px solid rgba(34,197,94,0.4); color: #4ade80; }
  .pos-badge.WR { background: rgba(245,158,11,0.15); border: 1.5px solid rgba(245,158,11,0.4); color: #fbbf24; }
  .pos-badge.TE { background: rgba(168,85,247,0.15); border: 1.5px solid rgba(168,85,247,0.4); color: #c084fc; }
  .player-info { flex: 1; min-width: 0; }
  .player-name {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(26px, 5vw, 38px);
    text-transform: uppercase;
    letter-spacing: 2px;
    line-height: 1;
    color: #fff;
  }
  .player-meta {
    font-size: 14px;
    color: #ffffff;
    margin-top: 5px;
    font-family: 'Roboto Condensed', sans-serif;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .player-meta span { color: var(--blue); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 18px;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    flex-wrap: nowrap;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: 1;
    min-width: 80px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 9px 12px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn.active { background: var(--blue); color: #fff; }
  .tab-btn:hover:not(.active) { background: var(--blue-glow); color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* STAT CARDS */
  .stat-section-title {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--blue);
    margin: 20px 0 12px;
    padding-bottom: 7px;
    border-bottom: 1px solid var(--border);
  }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 10px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 14px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .stat-card:hover { border-color: var(--blue-dim); transform: translateY(-1px); }
  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--perc-color, var(--border));
  }
  .stat-label {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    padding-bottom: 5px;
  }
  .stat-value {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 800;
    font-size: 30px;
    line-height: 1;
    color: #fff;
  }
  .stat-perc {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 5px;
  }

  /* PERC BARS */
  .perc-bar-wrap {
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .perc-bar-title {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    padding-bottom: 8px;
    line-height: 1.4;
    word-break: break-word;
  }
  .perc-row {
    display: grid;
    grid-template-columns: 160px 1fr 42px;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .perc-name { font-family: 'Roboto Condensed', sans-serif; font-size: 14px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .perc-track { background: var(--surface2); border-radius: 99px; height: 8px; overflow: hidden; }
  .perc-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .perc-num { font-family: 'Roboto Condensed', sans-serif; font-weight: 800; font-size: 15px; text-align: right; }

  #emptyState { text-align: center; padding: 60px 20px; color: var(--text-muted); display: none; }
  #emptyState p { font-family: 'Roboto Condensed', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; }

  /* ── TABLET ─────────────────────────────────────────── */
  @media (max-width: 900px) {
    .top5-section { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── MOBILE ─────────────────────────────────────────── */
  @media (max-width: 600px) {
    .wrap { padding: 0 10px 50px; }
    .search-section { padding: 20px 0 14px; }
    #playerSearch { font-size: 16px; padding: 13px 14px; }

    /* Leaders: locked 2-col, no exceptions */
    .top5-section {
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 8px;
    }
    .top5-body { max-height: 260px; }
    .top5-head { padding: 8px 10px; gap: 5px; }
    .top5-pos { font-size: 10px; padding: 2px 5px; letter-spacing: 0; }
    .top5-title { font-size: 10px; letter-spacing: 0.5px; }
    .top5-stat-lbl { font-size: 9px; }
    .top5-row {
      grid-template-columns: 18px 1fr auto;
      padding: 7px 8px;
      gap: 5px;
    }
    .top5-rank { font-size: 11px; }
    .top5-name { font-size: 12px; }
    .top5-name small { font-size: 9px; margin-top: 0; }
    .top5-val { font-size: 13px; }

    /* Player header — NO logo on mobile */
    .player-header {
      padding: 12px 14px;
      gap: 10px;
      flex-wrap: nowrap;
    }
    .header-logo { display: none !important; }
    .pos-badge { font-size: 18px; padding: 5px 10px; }
    .player-name { font-size: clamp(18px, 6.5vw, 28px); letter-spacing: 1px; }
    .player-meta { font-size: 10px; letter-spacing: 0.5px; }
    .back-btn { font-size: 11px; padding: 6px 12px; }

    /* Tabs */
    .tabs { padding: 3px; gap: 2px; }
    .tab-btn {
      font-size: 10px !important;
      padding: 7px 6px !important;
      min-width: 0 !important;
      letter-spacing: 0.5px;
      flex: 1 1 0;
    }

    /* Stat section titles */
    .stat-section-title { font-size: 11px; letter-spacing: 1.5px; margin: 12px 0 8px; }

    /* Stat cards: force 2 columns */
    .stat-grid {
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 7px;
    }
    .stat-card { padding: 10px 9px; }
    .stat-label { font-size: 9px; letter-spacing: 0.3px; padding-bottom: 3px; margin-bottom: 4px; }
    .stat-value { font-size: 22px; }
    .stat-perc { font-size: 11px; }

    /* Percentile bars */
    .perc-bar-wrap { padding: 12px 10px; }
    .perc-bar-title { font-size: 10px; letter-spacing: 1px; margin-bottom: 10px; padding-bottom: 5px; }
    .perc-row {
      grid-template-columns: 90px 1fr 42px;
      gap: 7px;
      margin-bottom: 8px;
    }
    .perc-name { font-size: 11px; }
    .perc-track { height: 6px; }
    .perc-num { font-size: 12px; }
  }

  /* Very small phones */
  @media (max-width: 360px) {
    .top5-section { grid-template-columns: repeat(2, 1fr) !important; }
    .perc-row { grid-template-columns: 78px 1fr 38px; }
    .stat-value { font-size: 19px; }
    .player-name { font-size: 16px; }
    .tab-btn { font-size: 9px !important; padding: 6px 4px !important; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="search-section">
    <div class="search-box-wrap">
      <input type="text" id="playerSearch" placeholder="Search player name..." autocomplete="off">
      <div id="autocomplete"></div>
    </div>
  </div>

  <div id="loadingMsg">
    <span class="spinner"></span>
    LOADING PLAYER DATA...
  </div>

  <div id="top5Section" style="display:none">
    <div class="top5-section" id="top5Grid"></div>
  </div>

  <div id="emptyState"><p>No player found. Try a different name.</p></div>
  <div id="playerCard"></div>

</div>

<script>
// ─── PROXY STRATEGY ──────────────────────────────────────────────────────────
// Try the fastest proxy first, then fallback. Timeout tuned down to 6s to fail
// faster and not make the user wait on a dead proxy.
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

const SHEETS = {
  QB:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1152850061&single=true&output=csv',
  RB:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1056171373&single=true&output=csv',
  REC: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQubLK6Ykc3SNFSEGne1OI5WKppdgyCSV-4ToPCnvIOT8-uFbaNh81tB1OIyvdoOI5Jht-LzV-9p3gm/pub?gid=1048851676&single=true&output=csv'
};

// Session-level cache so repeat visits in same tab are instant
const _cache = {};

let allPlayers = [];

async function fetchWithFallback(url) {
  if (_cache[url]) return _cache[url];
  let lastErr;
  for (const makeProxy of PROXIES) {
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 6000); // 6s timeout per proxy
      const res = await fetch(makeProxy(url), { signal: controller.signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      if (!text || text.trim().length < 50) throw new Error('Empty response');
      _cache[url] = text; // cache on success
      return text;
    } catch(e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error('All proxies failed');
}

async function fetchCSV(url) {
  const text = await fetchWithFallback(url);
  return parseCSV(text);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/\r/g,''));
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim().replace(/\r/g,''); });
    return obj;
  });
}

function splitCSVLine(line) {
  const result = []; let inQ = false, cur = '';
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += c;
  }
  result.push(cur);
  return result;
}

async function loadAll(isRetry = false) {
  try {
    // Kick off all three fetches simultaneously
    const [qbData, rbData, recData] = await Promise.all([
      fetchCSV(SHEETS.QB),
      fetchCSV(SHEETS.RB),
      fetchCSV(SHEETS.REC)
    ]);

    qbData.forEach(row => {
      const name = row['display_name'];
      if (name) allPlayers.push({ name, pos: 'QB', team: row['posteam'] || row['team_abbr'] || '', data: row, sheet: 'QB' });
    });
    rbData.forEach(row => {
      const name = row['display_name'];
      if (name) allPlayers.push({ name, pos: 'RB', team: row['posteam'] || row['team_abbr'] || '', data: row, sheet: 'RB' });
    });
    recData.forEach(row => {
      const name = row['display_name'];
      const pos = (row['player_position'] || 'WR').trim().toUpperCase();
      if (name) allPlayers.push({ name, pos: pos === 'TE' ? 'TE' : 'WR', team: row['posteam'] || row['team_abbr'] || '', data: row, sheet: 'REC' });
    });

    document.getElementById('loadingMsg').style.display = 'none';
    buildTop5();
    document.getElementById('top5Section').style.display = 'block';
  } catch(e) {
    if (isRetry) {
      document.getElementById('loadingMsg').innerHTML =
        `<p style="color:#ef4444;font-family:'Roboto Condensed',sans-serif;letter-spacing:1px;font-size:15px;margin-bottom:14px">Failed to load data.</p>
         <button onclick="location.reload()" style="background:var(--blue);border:none;color:#fff;font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;padding:10px 24px;border-radius:7px;cursor:pointer;">Reload Page</button>`;
    } else {
      document.getElementById('loadingMsg').innerHTML = `<span class="spinner"></span>RETRYING...`;
      setTimeout(() => loadAll(true), 1500);
    }
    console.error(e);
  }
}

  const top = (pos, stat) => allPlayers.filter(p => p.pos === pos)

  const groups = [
    { pos: 'QB', label: 'Pass Yards', stat: 'YDS', players: top('QB','YDS') },
    { pos: 'RB', label: 'Rush Yards', stat: 'YDS', players: top('RB','YDS') },
    { pos: 'WR', label: 'Rec Yards',  stat: 'YDS', players: top('WR','YDS') },
    { pos: 'TE', label: 'Rec Yards',  stat: 'YDS', players: top('TE','YDS') },

        <span class="top5-title">${g.label}</span>

const searchInput = document.getElementById('playerSearch');
const acDiv = document.getElementById('autocomplete');
let acIndex = -1;

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  acIndex = -1;
  if (!q) {
    acDiv.style.display = 'none';
    if (allPlayers.length) {
      document.getElementById('top5Section').style.display = 'block';
      document.getElementById('playerCard').style.display = 'none';
      document.getElementById('emptyState').style.display = 'none';
    }
    return;
  }
  if (!allPlayers.length) return;
  const matches = allPlayers.filter(p => p.name.toLowerCase().includes(q)).slice(0, 10);
  if (!matches.length) { acDiv.style.display = 'none'; return; }

  acDiv.innerHTML = matches.map((p, i) => `
    <div class="ac-item" data-idx="${i}">
      <span class="ac-pos ${p.pos}">${p.pos}</span>
      <span class="ac-name">${p.name}</span>
      <span class="ac-team">${p.team}</span>
    </div>
  `).join('');
  acDiv.style.display = 'block';
  acDiv._matches = matches;

  acDiv.querySelectorAll('.ac-item').forEach(item => {
    item.addEventListener('click', () => {
      const m = acDiv._matches[+item.dataset.idx];
      searchInput.value = m.name;
      acDiv.style.display = 'none';
      selectPlayer(m);
    });
  });
});

searchInput.addEventListener('keydown', e => {
  const items = acDiv.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') { acIndex = Math.min(acIndex+1, items.length-1); hlAC(items); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { acIndex = Math.max(acIndex-1, 0); hlAC(items); e.preventDefault(); }
  else if (e.key === 'Enter' && acIndex >= 0 && acDiv._matches) {
    const m = acDiv._matches[acIndex];
    searchInput.value = m.name;
    acDiv.style.display = 'none';
    selectPlayer(m);
  } else if (e.key === 'Escape') acDiv.style.display = 'none';
});

document.addEventListener('click', e => { if (!e.target.closest('.search-box-wrap')) acDiv.style.display = 'none'; });
function hlAC(items) { items.forEach((item,i) => item.classList.toggle('active', i===acIndex)); }

// FORMAT
function fmt(val, dec=1) {
  if (val===null||val===undefined||val===''||isNaN(+val)) return '—';
  return parseFloat(val).toFixed(dec);
}
function fmtPct(val) {
  if (!val||isNaN(+val)) return '—';
  const n = parseFloat(val);
  const scaled = Math.abs(n) <= 1.5 ? n * 100 : n;
  return scaled.toFixed(1)+'%';
}
function fmtNum(val, dec=2) {
  if (val===null||val===undefined||val===''||isNaN(+val)) return '—';
  return parseFloat(val).toFixed(dec)+'%';
}
function ordinal(n) {
  const r = n % 100;
  if (r >= 11 && r <= 13) return n+'th';
  switch (n % 10) {
    case 1: return n+'st';
    case 2: return n+'nd';
    case 3: return n+'rd';
    default: return n+'th';
  }
}
function percColor(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return '#64748b';
  if (n >= 80) return '#22c55e';
  if (n >= 60) return '#86efac';
  if (n >= 40) return '#fbbf24';
  if (n >= 20) return '#f97316';
  return '#ef4444';
}
function percLabel(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return '';
  return `<span style="color:${percColor(n)};font-weight:800;font-size:14px;font-family:'Roboto Condensed',sans-serif">${ordinal(Math.round(n))}</span>`;
}
function statCard(label, value, percVal) {
  const color = percColor(parseFloat(percVal));
  return `<div class="stat-card" style="--perc-color:${color}">
    <div class="stat-label">${label}</div>
    <div class="stat-value">${value}</div>
    ${percVal ? `<div class="stat-perc">${percLabel(percVal)} <span style="color:var(--text-muted);font-size:10px">pctl</span></div>` : ''}
  </div>`;
}
function percBar(label, val) {
  const n = parseFloat(val);
  const pct = isNaN(n) ? 0 : Math.min(Math.max(n,0), 100);
  const color = percColor(n);
  return `<div class="perc-row">
    <div class="perc-name">${label}</div>
    <div class="perc-track"><div class="perc-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="perc-num" style="color:${color}">${isNaN(n)?'—':ordinal(Math.round(n))}</div>
  </div>`;
}
